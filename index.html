      { id:"e7",  unit:1, type:"mc", q:"¿Qué es un ataque de Man-in-the-Middle?", opts:["Acceso físico al dispositivo","Ataque de denegación de servicio","Interceptar y modificar comunicaciones entre dos partes","Envío masivo de correos no deseados"], a:2, exp:"MitM intercepta las comunicaciones entre dos partes sin que estas lo sepan, pudiendo leer o modificar los datos." },
      { id:"e8",  unit:1, type:"tf", q:"Nikto permite explotar vulnerabilidades de los sistemas GNU/Linux.", a:false, exp:"Nikto es un escáner de vulnerabilidades en servidores web, NO una herramienta de explotación." },
      { id:"e9",  unit:1, type:"mc", q:"¿Cuál es el principal objetivo de un ataque de ARP-Spoofing?", opts:["Redirigir el tráfico de red a través del atacante para realizar un ataque Man-in-the-Middle","Sobrecargar la red con paquetes ICMP","Infectar dispositivos mediante scripts maliciosos en el navegador","Obtener acceso físico mediante ingeniería inversa"], a:0, exp:"ARP Spoofing envenena la tabla ARP de los equipos para que el tráfico pase por el atacante (MitM)." },
      { id:"e10", unit:1, type:"mc", q:"¿Cuál de los siguientes ataques aprovecha vulnerabilidades del navegador del cliente?", opts:["Backdoor","SQL Injection","XSS (Cross Site Scripting)","DDoS"], a:2, exp:"XSS inyecta código JavaScript en la web que se ejecuta en el navegador del usuario víctima." },
      { id:"e11", unit:1, type:"mc", q:"¿Qué es un rootkit?", opts:["Programa que permite el acceso remoto sin ser detectado","Antivirus gratuito","Proxy que permite la redirección de tráfico web","Herramienta de copias de seguridad"], a:0, exp:"Un rootkit oculta su presencia en el sistema y proporciona acceso persistente al atacante sin ser detectado." },
      { id:"e12", unit:1, type:"mc", q:"¿Qué método o métodos se utilizan para realizar un ataque de fuerza bruta sobre una contraseña?", opts:["Ataque de diccionario","Ataque de generación de contraseñas","Rainbow-tables","Todas son correctas"], a:3, exp:"Un ataque de fuerza bruta puede combinar: diccionarios, generación exhaustiva y rainbow tables." },
      { id:"e13", unit:1, type:"mc", q:"¿En qué consiste un ataque de tipo VLAN Hopping?", opts:["En el envío de paquetes ARP falsos para redirigir tráfico","En explotar vulnerabilidades del navegador para acceder a VLANs","En aprovechar configuraciones incorrectas de switches para acceder a VLANs no autorizadas","En sobrecargar una VLAN con paquetes ICMP"], a:2, exp:"VLAN Hopping explota configuraciones débiles de switches (p.e. dynamic trunking) para saltar entre VLANs." },
      { id:"e14", unit:1, type:"mc", q:"¿Cuál es el propósito principal de la herramienta Hydra en ciberseguridad?", opts:["Analizar tráfico DNS","Escanear puertos abiertos en una red local","Realizar ataques de fuerza bruta contra servicios de autenticación","Detectar malware en dispositivos conectados"], a:2, exp:"Hydra (xHydra) es una herramienta de fuerza bruta contra servicios como SSH, FTP, HTTP, RDP, etc." },
      { id:"e15", unit:1, type:"mc", q:"¿Qué herramienta NO permite detectar las vulnerabilidades de un sistema?", opts:["nmap","Nessus","GFILANGuard","Todas las herramientas permiten detectar vulnerabilidades"], a:3, exp:"nmap (con scripts NSE), Nessus y GFI LANGuard pueden todas detectar vulnerabilidades. La respuesta correcta es 'd) Todas detectan'." },
      { id:"e16", unit:1, type:"mc", q:"¿Qué permite la vulnerabilidad MS03-026 / CVE-2003-0352 utilizada en las prácticas?", opts:["Atacar un servidor FTP","Atacar el módulo RPC de Windows","Atacar el servicio VNC de Windows","Atacar el servicio RDP de Windows"], a:1, exp:"MS03-026 explota un desbordamiento de buffer en el módulo DCOM RPC de Windows (usada por el gusano Blaster)." },
      { id:"e17", unit:1, type:"mc", q:"En Metasploit, ¿qué shell permite que el ATACANTE se conecte directamente al servidor víctima?", opts:["win32_adduser","win32_bind","win32_reverse","win32_reverse_vncinject"], a:1, exp:"win32_bind: la víctima abre un puerto y espera. El atacante se conecta a ella. La reverse es lo contrario: la víctima llama al atacante." },
      { id:"e18", unit:1, type:"mc", q:"En Metasploit, ¿qué permite indicar la acción que quieres realizar en el servidor víctima?", opts:["exploit","encoder","payload","scanner"], a:2, exp:"El payload define qué se ejecutará en el sistema víctima tras explotar la vulnerabilidad (shell, añadir usuario, etc.)." },
      { id:"e19", unit:1, type:"mc", q:"¿Qué comando permite iniciar la consola de Metasploit?", opts:["start metasploit","msfconsole","run msf","launch exploit"], a:1, exp:"msfconsole es el comando para abrir la consola interactiva de Metasploit desde el terminal." },
      { id:"e20", unit:1, type:"mc", q:"¿Qué herramienta de la Unidad 1 permite sugerir exploits para realizar escalada de privilegios en Linux?", opts:["linux-exploit-suggester","nmap","metasploit","amap"], a:0, exp:"linux-exploit-suggester analiza la versión del kernel y sugiere exploits aplicables para escalar privilegios." },
      { id:"e21", unit:2, type:"tf", q:"Con respecto a un servicio de DNS, es recomendable tener separados DNS internos y externos.", a:true, exp:"Separar DNS interno (info privada) y externo (solo info pública) mejora la seguridad evitando revelar la infraestructura interna." },
      { id:"e22", unit:2, type:"tf", q:"¿Es recomendable que un desarrollador web trabaje directamente en un servidor en producción para programar la web?", a:false, exp:"Nunca se debe desarrollar en producción. El flujo correcto es: desarrollo → staging → producción." },
      { id:"e23", unit:2, type:"mc", q:"¿Qué fichero en GNU/Linux permite establecer la longitud de las contraseñas?", opts:["/etc/login.defs","/etc/pam.d/common-password","/etc/passwd","/etc/fail2ban/fail2ban.conf"], a:1, exp:"/etc/pam.d/common-password configura el módulo PAM (pam_pwquality) que controla la complejidad y longitud mínima de contraseñas." },
      { id:"e24", unit:2, type:"tf", q:"Si cambiamos la pancarta (banner) de un servicio como SMTP, dicho servicio dejará de funcionar correctamente.", a:false, exp:"Cambiar el banner solo oculta información del servidor (versión, SO). No afecta en absoluto al funcionamiento del servicio." },
      { id:"e25", unit:2, type:"mc", q:"¿Qué fichero en GNU/Linux permite establecer el tiempo de vigencia de las contraseñas?", opts:["/etc/login.defs","/etc/pam.d/common-password","/etc/passwd","/etc/fail2ban/fail2ban.conf"], a:0, exp:"/etc/login.defs contiene PASS_MAX_DAYS, PASS_MIN_DAYS y PASS_WARN_AGE para la caducidad de contraseñas." },
      { id:"e26", unit:2, type:"mc", q:"Indica la medida que puede evitar un ataque LFI en un servidor web.", opts:["Limitar los permisos de ejecución de los usuarios del sistema","Limitar los permisos de apache","Limitar la ejecución de código PHP","Limitar el rendimiento de apache"], a:1, exp:"LFI ocurre cuando apache puede leer ficheros del sistema. Restringir los permisos del usuario apache evita el acceso a ficheros sensibles." },
      { id:"e27", unit:3, type:"tf", q:"Los Sistemas de Detección de Intrusos permiten detectar comportamientos sospechosos en una red de ordenadores.", a:true, exp:"Los IDS monitorizan el tráfico o el sistema en busca de patrones de ataque o comportamientos anómalos." },
      { id:"e28", unit:2, type:"mc", q:"¿Cuál es la función principal de Fail2Ban?", opts:["Detectar malware en archivos del sistema","Bloquear direcciones IP después de múltiples intentos fallidos de autenticación","Escanear puertos abiertos en la red","Realizar copias de seguridad automáticas"], a:1, exp:"Fail2Ban monitoriza los logs y banea automáticamente las IPs que superan el número configurado de intentos fallidos." },
      { id:"e29", unit:2, type:"mc", q:"¿Qué distribución de enrutamiento has utilizado para realizar las prácticas?", opts:["IPCop","VyOS","Fedora","pfsense"], a:3, exp:"pfsense fue la distribución de enrutamiento/firewall usada en las prácticas de Seguridad Informática de la UAL." },
      { id:"e30", unit:2, type:"mc", q:"Indica el comando de iptables que permite publicar el servicio web del servidor interno 10.0.0.100.", opts:["iptables -t nat -A PREROUTING -i eth0 -p TCP --dport 80 -j DNAT --to 10.0.0.100:80","iptables -t nat -A PREROUTING -i eth0 -j DNAT --to 10.0.0.100","iptables -t nat -A POSTROUTING -i eth0 -p TCP --dport 80 -j DNAT --to 10.0.0.100:80","iptables -t nat -A POSTROUTING -i eth0 -j DNAT --to 10.0.0.100"], a:0, exp:"DNAT en PREROUTING redirige el tráfico entrante por el puerto 80 al servidor interno. Se debe especificar protocolo y puerto." },
      { id:"e31", unit:2, type:"mc", q:"¿Qué política de iptables establece que todos los paquetes ENTRANTES sean bloqueados por defecto?", opts:["iptables -P OUTPUT DROP","iptables -A INPUT DROP","iptables -P INPUT DROP","iptables --flush"], a:2, exp:"-P establece la política por defecto de la cadena. INPUT controla el tráfico entrante. DROP lo bloquea silenciosamente." },
      { id:"e32", unit:3, type:"tf", q:"La detección de uso indebido en un IDS se basa en la detección de unos patrones o firmas relacionados con ataques ya conocidos.", a:true, exp:"La detección de patrones/firmas compara el tráfico con una base de datos de ataques conocidos. Es precisa pero no detecta ataques nuevos." },
      { id:"e33", unit:3, type:"tf", q:"Snort puede trabajar en modo IPS (Sistema de Prevención de Intrusiones).", a:true, exp:"Con el modo Inline (usando fwsnort + iptables), Snort actúa como IPS bloqueando activamente los paquetes maliciosos." },
      { id:"e34", unit:3, type:"tf", q:"Se considera una actividad anómala la explotación de 'agujeros' del sistema (pe. fallos en servicios web).", a:true, exp:"La explotación de vulnerabilidades es una actividad claramente anómala que un IDS bien configurado debería detectar y alertar." },
      { id:"e35", unit:3, type:"tf", q:"Un honeypot permite simular uno o varios sistemas informáticos con el fin de tentar a potenciales intrusos.", a:true, exp:"Los honeypots son sistemas trampa que simulan ser vulnerables para atraer a atacantes y estudiar sus técnicas." },
      { id:"e36", unit:3, type:"tf", q:"No tiene sentido un Sistema de Detección de Intrusos si tenemos un cortafuegos bien configurado.", a:false, exp:"IDS y firewall son complementarios: el firewall bloquea tráfico no permitido, el IDS detecta ataques dentro del tráfico permitido." },
      { id:"e37", unit:3, type:"tf", q:"El reconocimiento de puertos puede considerarse como una actividad anómala que podría hacer saltar la alarma en un IDS.", a:true, exp:"Un escaneo de puertos es una actividad anómala típica (precede a un ataque) que los IDS están configurados para detectar." },
      { id:"e38", unit:3, type:"mc", q:"¿Qué parámetros afectan en la configuración de Snort al procesar el tráfico de la red?", opts:["Reglas","Variables de red","Preprocesadores","Todas son correctas"], a:3, exp:"Snort se configura con reglas (qué detectar), variables de red (rangos IP) y preprocesadores (decodificadores de protocolos)." },
      { id:"e39", unit:3, type:"mc", q:"¿Qué herramienta permite monitorizar el funcionamiento de muchos dispositivos de red (p.ej. router, switch, servidores)?", opts:["Snort","Nagios","Suricata","Iptables"], a:1, exp:"Nagios es la herramienta de monitorización centralizada. Snort y Suricata son IDS/IPS, no herramientas de monitorización general." },
      { id:"e40", unit:4, type:"tf", q:"Una vez realizado el análisis de las evidencias, se genera un único documento no técnico donde se describe lo descubierto.", a:false, exp:"Se generan DOS documentos: uno técnico (detallado para especialistas) y uno ejecutivo (sin tecnicismos, para la dirección)." },
      { id:"e41", unit:4, type:"tf", q:"En una copia incremental se copian sólo los archivos de los usuarios.", a:false, exp:"La incremental copia los ficheros MODIFICADOS desde la última copia (de cualquier tipo), no solo los de usuarios." },
      { id:"e42", unit:4, type:"mc", q:"¿Qué niveles RAID son los que más se utilizan?", opts:["5, 1 y 2","5, 4 y 0+1","0, 1 y 5","0, 3 y 5"], a:2, exp:"RAID 0 (striping/velocidad), RAID 1 (mirroring/redundancia) y RAID 5 (striping+paridad) son los más utilizados en la práctica." },

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

          prev.includes(u) ? prev.filter(x => x !== u) : [...prev, u]
        );
      }

      function startTest() {
        const pool = mode === "exam"
          ? EXAM_JUNE_2025
          : shuffle(ALL_QUESTIONS.filter(q => selectedUnits.includes(q.unit))).slice(0, Math.min(50, ALL_QUESTIONS.filter(q => selectedUnits.includes(q.unit)).length));
        setQuestions(pool);
        setCurrent(0);
        setAnswered(null);
        setCorrect(0);
        setWrong(0);
        setSkipped(0);
        setResults([]);
        setShowExp(false);
        setScreen("test");
      }

      function handleAnswer(choice) {
        if (answered !== null) return;
        const q = questions[current];
        const isCorrect = choice === q.a;
        setAnswered(choice);
        setShowExp(false);
        if (isCorrect) setCorrect(c => c + 1);
        else setWrong(w => w + 1);
        setResults(r => [...r, { q, choice, isCorrect }]);
      }

      function handleSkip() {
        if (answered !== null) return;
        const q = questions[current];
        setAnswered("skip");
        setSkipped(s => s + 1);
        setResults(r => [...r, { q, choice: "skip", isCorrect: false, skipped: true }]);
      }

      function next() {
        if (current + 1 >= questions.length) {
          setScreen("results");
        } else {
          setCurrent(c => c + 1);
          setAnswered(null);
          setShowExp(false);
        }
      }

      const score = correct - wrong;
      const total = questions.length;
      const nota = total > 0 ? Math.max(0, (score / total) * 10) : 0;

      if (screen === "library") {
        return (
          <div style={{ padding: "1.5rem 1rem 5rem", maxWidth: 600, margin: "0 auto" }}>
            <button className="dark-toggle" onClick={toggleDark} aria-label="Cambiar tema">
              <i className={`ti ${darkMode ? "ti-sun" : "ti-moon"}`} />
            </button>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:"1.25rem" }}>
              <button onClick={() => setScreen("menu")} style={{ padding:"6px 12px", fontSize:13 }}>
                <i className="ti ti-arrow-left" /> Volver
              </button>
              <h2 style={{ margin:0, fontSize:20, fontWeight:500, color:"var(--color-text-primary)" }}>
                Biblioteca de Repaso
              </h2>
            </div>

            {LIBRARY.map(unit => {
              const uOpen = openUnit === unit.unit;
              return (
                <div key={unit.unit} style={{ marginBottom:10, borderRadius:"var(--border-radius-lg)", overflow:"hidden", border:`1px solid ${uOpen ? unit.color+"66" : "var(--color-border-tertiary)"}` }}>
                  <div
                    onClick={() => { setOpenUnit(uOpen ? null : unit.unit); setOpenSection(null); }}
                    style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px", cursor:"pointer", background: uOpen ? unit.color+"15" : "var(--color-background-primary)" }}
                  >
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ width:8, height:8, borderRadius:"50%", background:unit.color, flexShrink:0 }} />
                      <span style={{ fontWeight:500, fontSize:14, color:"var(--color-text-primary)" }}>{unit.title}</span>
                    </div>
                    <i className={`ti ${uOpen ? "ti-chevron-up" : "ti-chevron-down"}`} style={{ color:"var(--color-text-secondary)", fontSize:16 }} />
                  </div>

                  {uOpen && (
                    <div style={{ borderTop:`1px solid ${unit.color+"33"}` }}>
                      {unit.sections.map((sec, si) => {
                        const sKey = `${unit.unit}-${si}`;
                        const sOpen = openSection === sKey;
                        return (
                          <div key={si} style={{ borderBottom: si < unit.sections.length-1 ? "1px solid var(--color-border-tertiary)" : "none" }}>
                            <div
                              onClick={() => setOpenSection(sOpen ? null : sKey)}
                              style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 16px 11px 24px", cursor:"pointer", background:"var(--color-background-primary)" }}
                            >
                              <span style={{ fontSize:13, fontWeight:500, color: unit.color }}>{sec.title}</span>
                              <i className={`ti ${sOpen ? "ti-chevron-up" : "ti-chevron-right"}`} style={{ color:"var(--color-text-secondary)", fontSize:14 }} />
                            </div>
                            {sOpen && (
                              <div style={{ padding:"4px 16px 12px 24px", background:"var(--color-background-secondary)" }}>
                                {sec.items.map((item, ii) => (
                                  <div key={ii} style={{ display:"flex", gap:8, padding:"6px 0", borderBottom: ii < sec.items.length-1 ? "1px solid var(--color-border-tertiary)" : "none" }}>
                                    <span style={{ color:unit.color, fontSize:12, marginTop:2, flexShrink:0 }}>▸</span>
                                    <span style={{ fontSize:13, color:"var(--color-text-primary)", lineHeight:1.55 }}>{item}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            <p style={{ position:"fixed", bottom:8, right:12, margin:0, fontSize:11, color:"var(--color-text-secondary)", opacity:0.55 }}>
              v1.3.0 · Fran Ruiz
            </p>
          </div>
        );
      }

      if (screen === "menu") {
        const practiceOk = mode === "practice" && selectedUnits.length > 0;
        const examOk = mode === "exam";
        const canStart = practiceOk || examOk;
        return (
          <div style={{ padding: "2rem 1rem 4rem", maxWidth: 600, margin: "0 auto" }}>
            <button className="dark-toggle" onClick={toggleDark} aria-label="Cambiar tema">
              <i className={`ti ${darkMode ? "ti-sun" : "ti-moon"}`} />
            </button>
            <h2 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 0.25rem", color: "var(--color-text-primary)" }}>
              Seguridad Informática
            </h2>
            <p style={{ fontSize: 13, color: "var(--color-text-secondary)", margin: "0 0 1.25rem" }}>
              Penalización: <strong>1 mal = −1 bien</strong>
            </p>

            {/* Selector de modo */}
            <div style={{ display: "flex", gap: 10, marginBottom: "1.25rem" }}>
              {[
                { id: "practice", label: "Test de Práctica", desc: "50 preguntas aleatorias de 220", icon: "ti-books" },
                { id: "exam",     label: "Examen Jun 2025",  desc: "50 preguntas del examen oficial", icon: "ti-school" },
              ].map(m => {
                const active = mode === m.id;
                return (
                  <div key={m.id} onClick={() => setMode(m.id)} style={{
                    flex: 1, padding: "12px 14px",
                    borderRadius: "var(--border-radius-lg)",
                    border: active ? "2px solid #185FA5" : "0.5px solid var(--color-border-tertiary)",
                    background: active ? "#EEF4FB" : "var(--color-background-primary)",
                    cursor: "pointer", transition: "all 0.15s",
                  }}>
                    <i className={`ti ${m.icon}`} style={{ fontSize: 18, color: active ? "#185FA5" : "var(--color-text-secondary)" }} aria-hidden="true" />
                    <p style={{ margin: "4px 0 2px", fontWeight: 500, fontSize: 13, color: active ? "#185FA5" : "var(--color-text-primary)" }}>{m.label}</p>
                    <p style={{ margin: 0, fontSize: 11, color: "var(--color-text-secondary)" }}>{m.desc}</p>
                  </div>
                );
              })}
            </div>

            {/* Selector de unidades (solo en modo práctica) */}
            {mode === "practice" && (
              <>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: "1rem" }}>
                  {[1,2,3,4,5].map(u => {
                    const sel = selectedUnits.includes(u);
                    const count = ALL_QUESTIONS.filter(q => q.unit === u).length;
                    return (
                      <div
                        key={u}
                        onClick={() => toggleUnit(u)}
                        style={{
                          display: "flex", alignItems: "center", gap: 12,
                          padding: "12px 16px",
                          borderRadius: "var(--border-radius-lg)",
                          border: sel ? `2px solid ${UNIT_COLORS[u]}` : "0.5px solid var(--color-border-tertiary)",
                          background: sel ? "var(--color-background-secondary)" : "var(--color-background-primary)",
                          cursor: "pointer", transition: "all 0.15s",
                        }}
                      >
                        <div style={{
                          width: 20, height: 20, borderRadius: 4,
                          background: sel ? UNIT_COLORS[u] : "transparent",
                          border: sel ? `2px solid ${UNIT_COLORS[u]}` : "1.5px solid var(--color-border-secondary)",
                          display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                        }}>
                          {sel && <i className="ti ti-check" style={{ fontSize: 13, color: "#fff" }} aria-hidden="true" />}
                        </div>
                        <div style={{ flex: 1 }}>
                          <p style={{ margin: 0, fontWeight: 500, fontSize: 14, color: "var(--color-text-primary)" }}>
                            {UNIT_NAMES[u]}
                          </p>
                        </div>
                        <span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>{count} preguntas</span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: "1rem" }}>
                  <button onClick={() => setSelectedUnits([1,2,3,4,5])} style={{ fontSize: 13, padding: "6px 14px" }}>Todas</button>
                  <button onClick={() => setSelectedUnits([])} style={{ fontSize: 13, padding: "6px 14px" }}>Ninguna</button>
                </div>
              </>
            )}

            <div style={{
              padding: "12px 16px",
              borderRadius: "var(--border-radius-md)",
              background: "var(--color-background-secondary)",
              marginBottom: "1.5rem",
              fontSize: 13, color: "var(--color-text-secondary)"
            }}>
              {mode === "exam"
                ? "50 preguntas del Examen de Seguridad Informática – UAL (18/06/2025)"
                : selectedUnits.length === 0
                  ? "Selecciona al menos una unidad"
                  : (() => {
                      const total = ALL_QUESTIONS.filter(q => selectedUnits.includes(q.unit)).length;
                      return `${Math.min(50, total)} preguntas aleatorias de ${total} disponibles`;
                    })()
              }
            </div>

            <div style={{ display:"flex", gap:10 }}>
              <button
                onClick={() => setScreen("library")}
                style={{ flex:"0 0 auto", padding:"14px 18px", fontSize:14, borderRadius:"var(--border-radius-lg)" }}
                title="Biblioteca de Repaso"
              >
                <i className="ti ti-books" style={{ fontSize:18 }} />
              </button>
              <button
                onClick={startTest}
                disabled={!canStart}
                style={{
                  flex:1, padding: "14px",
                  fontSize: 15, fontWeight: 500,
                  background: canStart ? "#185FA5" : "var(--color-background-secondary)",
                  color: canStart ? "#fff" : "var(--color-text-secondary)",
                  border: "none", borderRadius: "var(--border-radius-lg)", cursor: canStart ? "pointer" : "default",
                }}
              >
                {mode === "exam" ? "Iniciar Examen" : "Empezar test"} <i className="ti ti-arrow-right" aria-hidden="true" />
              </button>
            </div>

            {/* Firma */}
            <p style={{ position: "fixed", bottom: 8, right: 12, margin: 0, fontSize: 11, color: "var(--color-text-secondary)", opacity: 0.55 }}>
              v1.3.0 · Fran Ruiz
            </p>
          </div>
        );
      }

      if (screen === "results") {
        const notaColor = nota >= 5 ? (darkMode ? "#5DCAA5" : "#0F6E56") : (darkMode ? "#F0997B" : "#993C1D");
        return (
          <div style={{ padding: "2rem 1rem", maxWidth: 600, margin: "0 auto" }}>
            <button className="dark-toggle" onClick={toggleDark} aria-label="Cambiar tema">
              <i className={`ti ${darkMode ? "ti-sun" : "ti-moon"}`} />
            </button>
            <h2 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 1.5rem" }}>Resultados</h2>

            <div style={{
              display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))",
              gap: 12, marginBottom: "1.5rem"
            }}>
              {[
                { label: "Aciertos", val: correct, color: "#0F6E56" },
                { label: "Errores", val: wrong, color: "#993C1D" },
                { label: "En blanco", val: skipped, color: "#888780" },
                { label: "Nota", val: nota.toFixed(1) + "/10", color: notaColor },
              ].map(({ label, val, color }) => (
                <div key={label} style={{
                  background: "var(--color-background-secondary)",
                  borderRadius: "var(--border-radius-md)",
                  padding: "12px 16px", textAlign: "center"
                }}>
                  <p style={{ margin: "0 0 4px", fontSize: 12, color: "var(--color-text-secondary)" }}>{label}</p>
                  <p style={{ margin: 0, fontSize: 24, fontWeight: 500, color }}>{val}</p>
                </div>
              ))}
            </div>

            <div style={{
              padding: "12px 16px", borderRadius: "var(--border-radius-md)",
              background: "var(--color-background-secondary)", marginBottom: "1.5rem",
              fontSize: 13, color: "var(--color-text-secondary)"
            }}>
              Fórmula: ({correct} aciertos − {wrong} errores) / {total} × 10 = <strong style={{ color: notaColor }}>{nota.toFixed(2)}</strong>
            </div>

            <h3 style={{ fontSize: 16, fontWeight: 500, margin: "0 0 1rem" }}>Revisión de respuestas</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: "1.5rem" }}>
              {results.map(({ q, choice, isCorrect, skipped: sk }, i) => (
                <div key={i} style={{
                  padding: "12px 16px",
                  borderRadius: "var(--border-radius-md)",
                  border: `0.5px solid ${sk ? "var(--color-border-tertiary)" : isCorrect ? "#5DCAA5" : "#F0997B"}`,
                  background: sk ? "var(--color-background-secondary)" : isCorrect ? cOk : cErr,
                }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                    <i
                      className={`ti ${sk ? "ti-minus" : isCorrect ? "ti-check" : "ti-x"}`}
                      style={{ fontSize: 16, color: sk ? "var(--color-text-secondary)" : isCorrect ? cOkT : cErrT, flexShrink: 0, marginTop: 2 }}
                      aria-hidden="true"
                    />
                    <div>
                      <p style={{ margin: "0 0 4px", fontSize: 13, fontWeight: 500, color: "var(--color-text-primary)" }}>
                        P{i+1}. {q.q}
                      </p>
                      {!isCorrect && !sk && (
                        <p style={{ margin: "0 0 2px", fontSize: 12, color: "#993C1D" }}>
                          Correcta: {q.type === "tf" ? (q.a ? "Verdadero" : "Falso") : q.opts[q.a]}
                        </p>
                      )}
                      <p style={{ margin: 0, fontSize: 12, color: "var(--color-text-secondary)", fontStyle: "italic" }}>
                        {q.exp}
                      </p>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <button
              onClick={() => setScreen("menu")}
              style={{ width: "100%", padding: "12px", fontSize: 14, fontWeight: 500, borderRadius: "var(--border-radius-lg)" }}
            >
              <i className="ti ti-refresh" aria-hidden="true" /> Volver al menú
            </button>
            <p style={{ position: "fixed", bottom: 8, right: 12, margin: 0, fontSize: 11, color: "var(--color-text-secondary)", opacity: 0.55 }}>
              v1.3.0 · Fran Ruiz
            </p>
          </div>
        );
      }

      // TEST SCREEN
      const q = questions[current];
      const progress = (current / questions.length) * 100;
      const unitColor = UNIT_COLORS[q.unit];

      const cOk  = darkMode ? "#0d2b1d" : "#E1F5EE";
      const cErr = darkMode ? "#2b0d0d" : "#FAECE7";
      const cOkT = darkMode ? "#5DCAA5" : "#0F6E56";
      const cErrT= darkMode ? "#F0997B" : "#993C1D";

      function getOptBg(i) {
        if (answered === null) return "var(--color-background-primary)";
        const isAnswer = q.type === "mc" ? i === q.a : i === (q.a ? 0 : 1);
        const wasChosen = q.type === "mc" ? answered === i : answered === (i === 0);
        if (isAnswer) return cOk;
        if (wasChosen && !isAnswer) return cErr;
        return "var(--color-background-secondary)";
      }
      function getOptBorder(i) {
        if (answered === null) return "0.5px solid var(--color-border-tertiary)";
        const isAnswer = q.type === "mc" ? i === q.a : i === (q.a ? 0 : 1);
        const wasChosen = q.type === "mc" ? answered === i : answered === (i === 0);
        if (isAnswer) return "0.5px solid #5DCAA5";
        if (wasChosen && !isAnswer) return "0.5px solid #F0997B";
        return "0.5px solid var(--color-border-tertiary)";
      }
      function getOptIcon(i) {
        if (answered === null) return null;
        const isAnswer = q.type === "mc" ? i === q.a : i === (q.a ? 0 : 1);
        const wasChosen = q.type === "mc" ? answered === i : answered === (i === 0);
        if (isAnswer) return <i className="ti ti-check" style={{ color: cOkT, fontSize: 16 }} aria-hidden="true" />;
        if (wasChosen && !isAnswer) return <i className="ti ti-x" style={{ color: cErrT, fontSize: 16 }} aria-hidden="true" />;
        return null;
      }

      const opts = q.type === "tf" ? ["Verdadero", "Falso"] : q.opts;

      return (
        <div style={{ padding: "1.5rem 1rem", maxWidth: 600, margin: "0 auto" }}>
          <button className="dark-toggle" onClick={toggleDark} aria-label="Cambiar tema">
            <i className={`ti ${darkMode ? "ti-sun" : "ti-moon"}`} />
          </button>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "0.75rem" }}>
            <span style={{
              fontSize: 11, fontWeight: 500, padding: "3px 10px",
              borderRadius: "var(--border-radius-md)",
              background: unitColor + "22", color: unitColor,
            }}>
              {UNIT_NAMES[q.unit]}
            </span>
            <span style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>
              {current + 1} / {questions.length}
            </span>
          </div>

          <div style={{ height: 4, background: "var(--color-border-tertiary)", borderRadius: 2, marginBottom: "1.25rem" }}>
            <div style={{ height: 4, width: `${progress}%`, background: unitColor, borderRadius: 2, transition: "width 0.3s" }} />
          </div>

          <div style={{ display: "flex", gap: 16, marginBottom: "0.75rem", fontSize: 13, color: "var(--color-text-secondary)" }}>
            <span style={{ color: cOkT }}><i className="ti ti-check" aria-hidden="true" /> {correct}</span>
            <span style={{ color: cErrT }}><i className="ti ti-x" aria-hidden="true" /> {wrong}</span>
            <span>— {skipped}</span>
            <span style={{ marginLeft: "auto", color: "var(--color-text-primary)", fontWeight: 500 }}>
              Parcial: {(correct - wrong).toFixed(0)}/{questions.length}
            </span>
          </div>

          <div style={{
            padding: "1.25rem",
            borderRadius: "var(--border-radius-lg)",
            background: "var(--color-background-primary)",
            border: "0.5px solid var(--color-border-tertiary)",
            marginBottom: "1rem",
          }}>
            <p style={{ margin: 0, fontSize: 15, lineHeight: 1.6, color: "var(--color-text-primary)", fontWeight: 500 }}>
              {q.q}
            </p>
            {q.type === "tf" && (
              <span style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 4, display: "block" }}>
                (Verdadero / Falso)
              </span>
            )}
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: "1rem" }}>
            {opts.map((opt, i) => {
              const clickVal = q.type === "tf" ? (i === 0) : i;
              return (
                <div
                  key={i}
                  onClick={() => answered === null && handleAnswer(clickVal)}
                  style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "12px 16px",
                    borderRadius: "var(--border-radius-md)",
                    border: getOptBorder(i),
                    background: getOptBg(i),
                    cursor: answered === null ? "pointer" : "default",
                    transition: "all 0.15s",
                    gap: 8,
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{
                      fontSize: 11, fontWeight: 500, color: "var(--color-text-secondary)",
                      width: 18, flexShrink: 0, textAlign: "center"
                    }}>
                      {q.type === "mc" ? String.fromCharCode(65 + i) : (i === 0 ? "V" : "F")}
                    </span>
                    <span style={{ fontSize: 14, color: "var(--color-text-primary)" }}>{opt}</span>
                  </div>
                  {getOptIcon(i)}
                </div>
              );
            })}
          </div>

          {answered !== null && (
            <div style={{ marginBottom: "1rem" }}>
              <button
                onClick={() => setShowExp(e => !e)}
                style={{ fontSize: 13, padding: "6px 14px", marginBottom: showExp ? 8 : 0 }}
              >
                <i className="ti ti-info-circle" aria-hidden="true" /> {showExp ? "Ocultar" : "Ver"} explicación
              </button>
              {showExp && (
                <div style={{
                  padding: "12px 16px",
                  borderRadius: "var(--border-radius-md)",
                  background: "var(--color-background-secondary)",
                  border: "0.5px solid var(--color-border-tertiary)",
                  fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.6
                }}>
                  {q.exp}
                </div>
              )}
            </div>
          )}

          <div style={{ display: "flex", gap: 10 }}>
            {answered === null && (
              <button
                onClick={handleSkip}
                style={{ flex: 1, padding: "10px", fontSize: 13, color: "var(--color-text-secondary)" }}
              >
                Pasar
              </button>
            )}
            {answered !== null && (
              <button
                onClick={next}
                style={{
                  flex: 1, padding: "12px", fontSize: 14, fontWeight: 500,
                  background: "#185FA5", color: "#fff", border: "none",
                  borderRadius: "var(--border-radius-lg)", cursor: "pointer"
                }}
              >
                {current + 1 >= questions.length ? "Ver resultados" : "Siguiente"} <i className="ti ti-arrow-right" aria-hidden="true" />
              </button>
            )}
          </div>
          <p style={{ position: "fixed", bottom: 8, right: 12, margin: 0, fontSize: 11, color: "var(--color-text-secondary)", opacity: 0.55 }}>
            v1.3.0 · Fran Ruiz
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
