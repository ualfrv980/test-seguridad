  <title>Test Seguridad Informática</title>

  <!-- PWA -->

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Seguridad" />
  <link rel="apple-touch-icon" href="./icon.svg" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b7280;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f3f4f6;
      --color-border-tertiary: #e5e7eb;
      --color-border-secondary: #d1d5db;
      --border-radius-lg: 12px;
      --border-radius-md: 8px;
    }
    body.dark {
      --color-text-primary: #f1f5f9;
      --color-text-secondary: #94a3b8;
      --color-background-primary: #1e293b;
      --color-background-secondary: #0f172a;
      --color-border-tertiary: #334155;
      --color-border-secondary: #475569;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }
    button {
      font-family: inherit;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.8; }
    button:disabled { cursor: default; opacity: 0.5; }
    .dark-toggle {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; border: 0.5px solid var(--color-border-secondary) !important;
      background: var(--color-background-primary) !important;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      cursor: pointer; padding: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const ALL_QUESTIONS = [
      // ===== UNIDAD 1: ATAQUES E INTRODUCCIÓN =====
      { id:1, unit:1, type:"mc", q:"¿Qué tipo de ataque consiste en saturar un servidor con múltiples solicitudes para que deje de funcionar?", opts:["Phishing","DDoS","Ransomware","Spoofing"], a:1, exp:"DDoS (Distributed Denial of Service) busca colapsar un servidor con tráfico masivo." },
      { id:2, unit:1, type:"tf", q:"Una consulta DNS inversa permite obtener una dirección IP a partir de un nombre de dominio.", a:false, exp:"Al revés: la DNS inversa obtiene el NOMBRE DE DOMINIO a partir de la IP." },
      { id:3, unit:1, type:"mc", q:"¿Cuál de estos ataques se aprovecha de errores en una base de datos?", opts:["Keylogging","Cross-site scripting","SQL Injection","Backdoor"], a:2, exp:"SQL Injection inyecta código SQL malicioso para manipular la base de datos." },
      { id:4, unit:1, type:"tf", q:"En un ataque activo de denegación de servicio, el intruso altera información para su beneficio.", a:false, exp:"El DoS busca interrumpir el servicio, no alterar datos. Alterar datos es un ataque de modificación." },
      { id:5, unit:1, type:"tf", q:"El rastreo de pilas IP (stack fingerprinting) es una técnica que permite identificar el sistema operativo de un equipo.", a:true, exp:"El rastreo de pilas analiza diferencias en la implementación TCP/IP de cada SO (OS fingerprinting)." },
      { id:6, unit:1, type:"tf", q:"La ejecución de un exploit del kernel siempre permite realizar una escalada de privilegios.", a:false, exp:"No siempre: depende del exploit concreto y del sistema. No todos los exploits de kernel garantizan root." },
      { id:7, unit:1, type:"mc", q:"¿Qué es un ataque Man-in-the-Middle?", opts:["Acceso físico al dispositivo","Ataque de denegación de servicio","Interceptar y modificar comunicaciones entre dos partes","Envío masivo de correos no deseados"], a:2, exp:"MitM intercepta las comunicaciones entre dos partes sin que estas lo sepan." },
      { id:8, unit:1, type:"tf", q:"Nikto es una herramienta que permite explotar vulnerabilidades de sistemas GNU/Linux.", a:false, exp:"Nikto es un escáner de vulnerabilidades en servidores web, NO un exploitador." },
      { id:9, unit:1, type:"mc", q:"¿Cuál es el principal objetivo de un ataque de ARP Spoofing?", opts:["Redirigir tráfico de red para realizar un ataque Man-in-the-Middle","Sobrecargar la red con paquetes ICMP","Infectar dispositivos con scripts maliciosos","Obtener acceso físico mediante ingeniería inversa"], a:0, exp:"ARP Spoofing envenena la tabla ARP para que el tráfico pase por el atacante (MitM)." },
      { id:10, unit:1, type:"mc", q:"¿Cuál de los siguientes ataques aprovecha vulnerabilidades del navegador del cliente?", opts:["Backdoor","SQL Injection","XSS (Cross-Site Scripting)","DDoS"], a:2, exp:"XSS inyecta código en la web que se ejecuta en el navegador del usuario víctima." },
      { id:11, unit:1, type:"mc", q:"¿Qué es un rootkit?", opts:["Programa que permite acceso remoto sin ser detectado","Antivirus gratuito","Proxy que redirige tráfico web","Herramienta de copias de seguridad"], a:0, exp:"Un rootkit oculta su presencia en el sistema y proporciona acceso persistente al atacante." },
      { id:12, unit:1, type:"mc", q:"¿Qué métodos se utilizan para realizar un ataque de fuerza bruta sobre una contraseña?", opts:["Ataque de diccionario","Generación de contraseñas","Rainbow tables","Todas son correctas"], a:3, exp:"Un ataque de fuerza bruta puede usar diccionarios, generación exhaustiva y rainbow tables." },
      { id:13, unit:1, type:"mc", q:"¿En qué consiste un ataque de tipo VLAN Hopping?", opts:["Envío de paquetes ARP falsos para redirigir tráfico","Explotar vulnerabilidades del navegador para acceder a VLANs","Aprovechar configuraciones incorrectas de switches para acceder a VLANs no autorizadas","Sobrecargar una VLAN con paquetes ICMP"], a:2, exp:"VLAN Hopping explota configuraciones débiles de switches (p.e. dynamic trunking) para saltar entre VLANs." },
      { id:14, unit:1, type:"mc", q:"¿Cuál es el propósito principal de la herramienta Hydra en ciberseguridad?", opts:["Analizar tráfico DNS","Escanear puertos abiertos","Realizar ataques de fuerza bruta contra servicios de autenticación","Detectar malware en dispositivos"], a:2, exp:"Hydra (xHydra) es una herramienta de fuerza bruta contra servicios como SSH, FTP, HTTP, etc." },
      { id:15, unit:1, type:"mc", q:"¿Cuál de las siguientes herramientas NO es específica para la detección de vulnerabilidades?", opts:["nmap","Nessus","GFI LANGuard","Todas detectan vulnerabilidades"], a:3, exp:"nmap con scripts NSE, Nessus y GFI LANGuard pueden detectar vulnerabilidades. La opción d) 'todas detectan' es correcta." },
      { id:16, unit:1, type:"mc", q:"¿Qué permite la vulnerabilidad MS03-026 / CVE-2003-0352 utilizada en las prácticas?", opts:["Atacar un servidor FTP","Atacar el módulo RPC de Windows","Atacar el servicio VNC de Windows","Atacar el servicio RDP de Windows"], a:1, exp:"MS03-026 explota un desbordamiento de buffer en el módulo DCOM RPC de Windows (usada por Blaster)." },
      { id:17, unit:1, type:"mc", q:"En Metasploit, ¿qué shell permite que el ATACANTE se conecte directamente al servidor víctima?", opts:["win32_adduser","win32_bind","win32_reverse","win32_reverse_vncinject"], a:1, exp:"win32_bind: la víctima escucha y el atacante se conecta a ella. La reverse shell es al revés: la víctima llama al atacante." },
      { id:18, unit:1, type:"mc", q:"En Metasploit, ¿qué indica el payload?", opts:["El exploit a usar","El encoder a aplicar","La acción que quieres realizar en el servidor víctima","El escáner de puertos"], a:2, exp:"El payload define qué se ejecutará en el sistema víctima tras explotar la vulnerabilidad." },
      { id:19, unit:1, type:"mc", q:"¿Qué comando permite iniciar la consola de Metasploit?", opts:["start metasploit","msfconsole","run msf","launch exploit"], a:1, exp:"# msfconsole es el comando para abrir la consola interactiva de Metasploit." },
      { id:20, unit:1, type:"mc", q:"¿Qué herramienta de la Unidad 1 permite sugerir exploits para realizar escalada de privilegios en Linux?", opts:["linux-exploit-suggester","nmap","metasploit","amap"], a:0, exp:"linux-exploit-suggester analiza el kernel y sugiere exploits aplicables para escalar privilegios." },
      { id:21, unit:1, type:"mc", q:"¿Cuál de los siguientes comandos de nmap detecta el sistema operativo de un host?", opts:["nmap -sV <IP>","nmap -O <IP>","nmap --script=vuln <IP>","nmap -p 80 <IP>"], a:1, exp:"nmap -O activa la detección de SO mediante el análisis de la pila TCP/IP." },
      { id:22, unit:1, type:"mc", q:"¿Qué herramienta se usa como proxy intermedio para manipular peticiones HTTP en ataques web?", opts:["xHydra","OWASP ZAP","Nikto","Snort"], a:1, exp:"OWASP ZAP actúa como proxy entre el navegador y el servidor, permitiendo interceptar y modificar las peticiones." },
      { id:23, unit:1, type:"tf", q:"LFI (Local File Inclusion) permite al atacante incluir ficheros del servidor web en la respuesta HTTP.", a:true, exp:"LFI explota una vulnerabilidad PHP que permite al atacante leer ficheros locales del servidor como /etc/passwd." },
      { id:24, unit:1, type:"mc", q:"¿Qué es la escalada de privilegios en Linux?", opts:["Obtener acceso remoto al servidor","Pasar de un usuario normal (user) a root ($→#)","Instalar un rootkit en el servidor","Escanear puertos de un servidor remoto"], a:1, exp:"La escalada de privilegios consiste en obtener acceso root partiendo de un usuario sin privilegios." },
      { id:25, unit:1, type:"mc", q:"¿Cuál de las siguientes es una forma de escalada de privilegios relacionada con la configuración del sistema?", opts:["Exploit del kernel","Sudoers mal configurados","Vulnerabilidad en servicio SSH","Exploit del DCOM"], a:1, exp:"Sudoers mal configurados permiten a un usuario ejecutar comandos como root sin conocer la contraseña de root." },

      // ===== UNIDAD 2: PREVENCIÓN =====
      { id:26, unit:2, type:"tf", q:"Con respecto a un servicio de DNS, es recomendable tener separados los DNS internos y externos.", a:true, exp:"Separar DNS interno y externo mejora la seguridad (el externo solo tiene info pública, el interno info privada)." },
      { id:27, unit:2, type:"tf", q:"Es recomendable que un desarrollador web trabaje directamente en el servidor de producción.", a:false, exp:"Nunca se debe desarrollar directamente en producción: se usa entorno de desarrollo → staging → producción." },
      { id:28, unit:2, type:"mc", q:"¿Qué fichero en GNU/Linux permite configurar la COMPLEJIDAD (longitud mínima) de las contraseñas?", opts:["/etc/login.defs","/etc/pam.d/common-password","/etc/passwd","/etc/fail2ban/fail2ban.conf"], a:1, exp:"/etc/pam.d/common-password configura el módulo PAM (pam_pwquality/pam_unix) que controla la complejidad de contraseñas." },
      { id:29, unit:2, type:"tf", q:"Si cambiamos la pancarta (banner) de un servicio como SMTP, dicho servicio dejará de funcionar.", a:false, exp:"Cambiar el banner solo oculta información del servidor (versión, SO). No afecta al funcionamiento." },
      { id:30, unit:2, type:"mc", q:"¿Qué fichero en GNU/Linux permite establecer el tiempo de vigencia (caducidad) de las contraseñas?", opts:["/etc/login.defs","/etc/pam.d/common-password","/etc/passwd","/etc/fail2ban/fail2ban.conf"], a:0, exp:"/etc/login.defs contiene PASS_MAX_DAYS, PASS_MIN_DAYS y PASS_WARN_AGE para la vigencia de contraseñas." },
      { id:31, unit:2, type:"mc", q:"¿Cuál es la función principal de Fail2Ban?", opts:["Detectar malware en archivos","Bloquear IPs tras múltiples intentos fallidos de autenticación","Escanear puertos abiertos","Hacer copias de seguridad automáticas"], a:1, exp:"Fail2Ban monitoriza logs y banea las IPs que superan un número de intentos de login fallidos." },
      { id:32, unit:2, type:"mc", q:"¿Qué distribución de enrutamiento se utilizó en las prácticas de la asignatura?", opts:["IPCop","VyOS","Fedora","pfsense"], a:3, exp:"pfsense fue la distribución de enrutamiento/firewall usada en las prácticas de Seguridad Informática UAL." },
      { id:33, unit:2, type:"mc", q:"¿Qué comando de iptables publica el servicio web del servidor interno 10.0.0.100 hacia el exterior?", opts:["iptables -t nat -A PREROUTING -i eth0 -p TCP --dport 80 -j DNAT --to 10.0.0.100:80","iptables -t nat -A PREROUTING -i eth0 -j DNAT --to 10.0.0.100","iptables -t nat -A POSTROUTING -i eth0 -p TCP --dport 80 -j DNAT --to 10.0.0.100:80","iptables -t nat -A POSTROUTING -i eth0 -j DNAT --to 10.0.0.100"], a:0, exp:"DNAT en PREROUTING redirige el tráfico entrante al servidor interno. Se especifica protocolo y puerto." },
      { id:34, unit:2, type:"mc", q:"¿Qué política de iptables establece que todos los paquetes ENTRANTES sean bloqueados por defecto?", opts:["iptables -P OUTPUT DROP","iptables -A INPUT DROP","iptables -P INPUT DROP","iptables --flush"], a:2, exp:"-P establece la política por defecto. INPUT controla el tráfico entrante. DROP lo bloquea." },
      { id:35, unit:2, type:"mc", q:"¿Qué medida evita un ataque LFI en un servidor web?", opts:["Limitar permisos de ejecución de usuarios del sistema","Limitar los permisos del usuario apache","Limitar la ejecución de código PHP","Limitar el rendimiento de apache"], a:1, exp:"LFI ocurre cuando apache puede leer ficheros del sistema. Restringir permisos de apache evita que acceda a ficheros sensibles." },
      { id:36, unit:2, type:"tf", q:"En IPCop, la interfaz RED corresponde a la red interna (LAN).", a:false, exp:"En IPCop: GREEN=Interna, BLUE=Inalámbrica, ORANGE=DMZ, RED=Internet (exterior)." },
      { id:37, unit:2, type:"mc", q:"¿Qué topología de seguridad perimetral incluye una zona desmilitarizada (DMZ) entre Internet y la red interna?", opts:["Router de protección simple","Zona neutra (DMZ)","Split screened subnet","Proxy transparente"], a:1, exp:"La DMZ o zona neutra coloca los servidores públicos entre dos routers, aislando la red interna." },
      { id:38, unit:2, type:"tf", q:"Fail2ban puede proteger cualquier servicio, no solo SSH.", a:true, exp:"Fail2ban puede configurarse para proteger FTP, HTTP, SMTP, y cualquier servicio que genere logs de autenticación." },
      { id:39, unit:2, type:"mc", q:"¿Qué herramienta permite auditar la seguridad de un sistema GNU/Linux de forma local?", opts:["Nessus","Lynis","GFI LANGuard","OpenVAS"], a:1, exp:"Lynis realiza una auditoría de seguridad local del sistema GNU/Linux (# lynis audit system)." },
      { id:40, unit:2, type:"tf", q:"Es recomendable no usar servicios que envíen las contraseñas en texto plano como Telnet o FTP.", a:true, exp:"Telnet y FTP transmiten credenciales sin cifrar. Se deben usar alternativas como SSH y SFTP/FTPS." },

      // ===== UNIDAD 3: DETECCIÓN =====
      { id:41, unit:3, type:"tf", q:"Los Sistemas de Detección de Intrusos (IDS) permiten detectar comportamientos sospechosos en una red.", a:true, exp:"Los IDS monitorizan el tráfico o el sistema en busca de patrones de ataque o comportamientos anómalos." },
      { id:42, unit:3, type:"tf", q:"No tiene sentido tener un IDS si ya tenemos un cortafuegos bien configurado.", a:false, exp:"IDS y firewall son complementarios: el firewall bloquea, el IDS detecta. Pueden existir ataques que pasan el firewall." },
      { id:43, unit:3, type:"tf", q:"La detección de uso indebido en un IDS se basa en la detección de patrones o firmas de ataques conocidos.", a:true, exp:"La detección de patrones (firmas) compara el tráfico con una base de datos de ataques conocidos." },
      { id:44, unit:3, type:"tf", q:"Snort puede trabajar en modo IPS (Sistema de Prevención de Intrusiones).", a:true, exp:"Con el modo Inline (fwsnort + iptables), Snort actúa como IPS bloqueando paquetes maliciosos." },
      { id:45, unit:3, type:"tf", q:"Se considera actividad anómala la explotación de agujeros del sistema (p.e. fallos en servicios web).", a:true, exp:"La explotación de vulnerabilidades es una actividad claramente anómala que un IDS debería detectar." },
      { id:46, unit:3, type:"tf", q:"Un honeypot permite simular uno o varios sistemas con el fin de tentar a potenciales intrusos.", a:true, exp:"Los honeypots son sistemas trampa que atraen a atacantes para estudiar sus técnicas." },
      { id:47, unit:3, type:"tf", q:"El reconocimiento de puertos (port scanning) puede hacer saltar la alarma en un IDS.", a:true, exp:"Un escaneo de puertos es una actividad anómala típica que los IDS están configurados para detectar." },
      { id:48, unit:3, type:"mc", q:"¿Qué parámetros afectan a la configuración de Snort para procesar el tráfico de la red?", opts:["Reglas","Variables de red","Preprocesadores","Todas son correctas"], a:3, exp:"Snort se configura con reglas (lo que detectar), variables de red (rangos IP) y preprocesadores (decodificadores de protocolo)." },
      { id:49, unit:3, type:"mc", q:"¿Qué herramienta permite monitorizar el funcionamiento de múltiples dispositivos de red (routers, switches, servidores)?", opts:["Snort","Nagios","Suricata","Iptables"], a:1, exp:"Nagios es la herramienta de monitorización centralizada de red. Snort y Suricata son IDS/IPS." },
      { id:50, unit:3, type:"mc", q:"¿Cuál es la diferencia entre detección de patrones y detección de anomalías en un IDS?", opts:["Patrones detecta ataques nuevos; anomalías solo conocidos","Patrones usa firmas de ataques conocidos; anomalías detecta desviaciones del comportamiento normal","Patrones es para HIDS; anomalías para NIDS","No hay diferencia, son el mismo método"], a:1, exp:"Patrones (firmas): compara con base de ataques conocidos. Anomalías: aprende el perfil normal y detecta desviaciones." },
      { id:51, unit:3, type:"mc", q:"Snort fue comprado en 2023 por:", opts:["Microsoft","Palo Alto Networks","CISCO","IBM"], a:2, exp:"Cisco adquirió Snort en 2023. Snort es el NIDS de detección de patrones estándar de facto en Internet." },
      { id:52, unit:3, type:"mc", q:"¿Cuáles son los modos de ejecución de Snort?", opts:["Sniffer, Packet Logger y NIDS","Solo NIDS e IPS","Solo sniffer y NIDS","Sniffer, escáner y firewall"], a:0, exp:"Snort tiene 3 modos: Sniffer (muestra paquetes), Packet Logger (guarda en disco) y NIDS (análisis y alertas). El modo Inline lo convierte en IPS." },
      { id:53, unit:3, type:"tf", q:"Un IDS basado en host (HIDS) se ubica en la red para analizar el tráfico entre equipos.", a:false, exp:"El HIDS se instala en el propio equipo. El NIDS analiza el tráfico de red desde un punto de la infraestructura." },

      // ===== UNIDAD 4: COPIAS DE SEGURIDAD =====
      { id:54, unit:4, type:"tf", q:"Una vez realizado el análisis de evidencias, se genera un único documento no técnico describiendo lo descubierto.", a:false, exp:"Se generan DOS documentos: uno técnico (detallado para especialistas) y otro ejecutivo (no técnico, para dirección)." },
      { id:55, unit:4, type:"tf", q:"En una copia incremental se copian solo los archivos de los usuarios.", a:false, exp:"La incremental copia los ficheros MODIFICADOS desde la última copia (sea del tipo que sea), no solo de usuarios." },
      { id:56, unit:4, type:"mc", q:"¿Qué niveles RAID son los más utilizados en la práctica?", opts:["5, 1 y 2","5, 4 y 0+1","0, 1 y 5","0, 3 y 5"], a:2, exp:"RAID 0 (striping/velocidad), RAID 1 (mirroring/redundancia) y RAID 5 (striping+paridad) son los más comunes." },
      { id:57, unit:4, type:"mc", q:"¿Qué comando permite calcular el hash MD5 de un fichero en GNU/Linux?", opts:["xIntegrity","md5sum","snort","EasyIDS"], a:1, exp:"# md5sum fichero.txt genera el hash MD5 del fichero, usado para verificar integridad." },
      { id:58, unit:4, type:"mc", q:"En los sistemas RAID 0...", opts:["Si falla un disco se conservan los datos","Almacena bits de paridad en otra unidad","Tiene una capacidad de procesamiento excelente (striping)","Almacena bits de paridad distribuidos en todos los discos"], a:2, exp:"RAID 0 usa striping: divide los datos entre discos para mayor rendimiento. NO tiene redundancia: si falla un disco, se pierden todos los datos." },
      { id:59, unit:4, type:"mc", q:"¿Qué significa la propiedad hot-swap en un disco duro?", opts:["Gran velocidad de transferencia","Permite cambiar el disco sin apagar el equipo","Transferencia de datos a gran velocidad","Permite conectar muchos dispositivos"], a:1, exp:"Hot-swap permite sustituir un disco duro averiado en caliente, sin apagar el servidor." },
      { id:60, unit:4, type:"tf", q:"Si queremos recuperar una parte del sistema, es más fácil con una copia completa que con una incremental.", a:true, exp:"Con copia completa basta con restaurar ese único fichero. Con incremental hay que aplicar TODAS las copias incrementales en orden." },
      { id:61, unit:4, type:"mc", q:"¿Cuál es la ventaja principal de la copia de seguridad DIFERENCIAL frente a la INCREMENTAL?", opts:["Ocupa menos espacio","La recuperación es más rápida (solo se necesitan completa + diferencial)","Es más rápida de realizar","Permite más versiones del mismo fichero"], a:1, exp:"La diferencial copia desde la última COMPLETA, así la restauración solo requiere 2 copias (completa + diferencial). La incremental requiere aplicar todas." },
      { id:62, unit:4, type:"mc", q:"¿Qué nivel de RAID distribuye la paridad entre todos los discos, permitiendo recuperar datos si falla uno?", opts:["RAID 0","RAID 1","RAID 5","RAID 10"], a:2, exp:"RAID 5 distribuye la paridad entre todos los discos, tolera el fallo de un disco y tiene buen rendimiento." },

      // ===== UNIDAD 5: ANÁLISIS FORENSE =====
      { id:63, unit:5, type:"tf", q:"El análisis de evidencias siempre se realiza en el mismo sistema informático que ha sido atacado.", a:false, exp:"El análisis NUNCA se hace en el sistema atacado (se contaminarían las evidencias). Se trabaja con imágenes en un sistema aislado." },
      { id:64, unit:5, type:"tf", q:"Cuando un sistema ha sido atacado, solo es necesario copiar el sistema de archivos de los usuarios; el resto no suele tener evidencias.", a:false, exp:"Hay que hacer copia de TODOS los sistemas de archivos porque las evidencias pueden estar en cualquier partición." },
      { id:65, unit:5, type:"tf", q:"Las evidencias más importantes en un análisis forense se encuentran en la memoria principal (RAM).", a:true, exp:"Las evidencias volátiles (RAM) son las más críticas porque se pierden al apagar el equipo: procesos, conexiones, claves en memoria, etc." },
      { id:66, unit:5, type:"tf", q:"En un análisis forense solo se recopilan las evidencias no volátiles.", a:false, exp:"Se recopilan AMBAS: volátiles (RAM, conexiones activas) primero por su carácter efímero, y no volátiles (disco) después." },
      { id:67, unit:5, type:"tf", q:"En un análisis forense, si recuperamos una parte del sistema, es más fácil con una copia de seguridad completa que con una incremental.", a:true, exp:"La copia completa permite restaurar directamente cualquier fichero. Con incremental hay que aplicar todas las copias en orden." },
      { id:68, unit:5, type:"mc", q:"¿Qué herramienta se usa para verificar la integridad de una imagen de disco en análisis forense?", opts:["snort","md5sum","fail2ban","iptables"], a:1, exp:"md5sum calcula el hash MD5 de la imagen .dd para verificar que no ha sido alterada durante el análisis." },
      { id:69, unit:5, type:"mc", q:"¿Cuántos documentos se generan normalmente al concluir un análisis forense?", opts:["Uno: el informe técnico","Uno: el informe ejecutivo","Dos: un informe técnico y uno ejecutivo (no técnico)","Tres: técnico, ejecutivo y de cadena de custodia"], a:2, exp:"Se generan al menos dos: el informe técnico (para expertos) y el informe ejecutivo (para dirección, sin tecnicismos)." },
      { id:70, unit:5, type:"mc", q:"¿Con qué herramienta se monta una imagen de disco .dd en Linux para analizar su contenido?", opts:["mount -oloop imagen.dd /punto_montaje","dd if=imagen.dd of=/dev/sdb","tar xf imagen.dd","cp imagen.dd /mnt/analisis"], a:0, exp:"mount -oloop permite montar un fichero de imagen de disco como si fuera una unidad real, para explorar su contenido." },

      // ===== UNIDAD 1 AMPLIACIÓN =====
      { id:71, unit:1, type:"mc", q:"¿Cuál es la primera ley de seguridad? 'Si alguien tiene ___ a tu equipo, dejará de ser tu equipo'", opts:["Acceso remoto","Acceso físico","Acceso lógico","Acceso por red"], a:1, exp:"Ley 1: el acceso físico al hardware es el vector más básico e irrefutable. Con acceso físico se puede cambiar o extraer el disco." },
      { id:72, unit:1, type:"tf", q:"Según las leyes de seguridad, la tecnología por sí sola garantiza la seguridad de un sistema.", a:false, exp:"Ley 7: 'La tecnología no es una panacea'. Un router mal configurado no vale para nada aunque sea el mejor del mercado." },
      { id:73, unit:1, type:"tf", q:"El anonimato absoluto en Internet no existe.", a:true, exp:"Ley 6: 'El anonimato absoluto no existe'. Los proxies, TOR y navegadores anónimos proporcionan privacidad, pero no anonimato total." },
      { id:74, unit:1, type:"mc", q:"¿Cuáles son los cuatro pilares de la seguridad informática?", opts:["Autenticación, Cifrado, Integridad, Disponibilidad","Confidencialidad, Integridad, No repudio, Disponibilidad","Privacidad, Fiabilidad, Integridad, Disponibilidad","Cifrado, Control de acceso, Auditoría, Disponibilidad"], a:1, exp:"Los 4 pilares (CIA+NR): Confidencialidad (privacidad), Integridad (no alteración), No repudio y Disponibilidad." },
      { id:75, unit:1, type:"mc", q:"¿Qué tipo de ataque consiste únicamente en observar y capturar comunicaciones sin modificarlas?", opts:["Ataque activo","Ataque de denegación de servicio","Ataque pasivo","Ataque de fabricación"], a:2, exp:"Los ataques pasivos (sniffing) solo escuchan el tráfico sin alterarlo. Los activos modifican o interrumpen el servicio." },
      { id:76, unit:1, type:"mc", q:"¿Qué herramienta realiza enumeración de información DNS de un dominio (incluyendo transferencias de zona)?", opts:["whois","dnsenum","xprobe2","amap"], a:1, exp:"dnsenum enumera registros DNS de un dominio e intenta transferencias de zona que podrían revelar la infraestructura interna." },
      { id:77, unit:1, type:"tf", q:"whois permite obtener información sobre el propietario registrado de un dominio.", a:true, exp:"whois consulta los registros ICANN/RIPE para obtener datos del registrante, servidores DNS y fechas de registro del dominio." },
      { id:78, unit:1, type:"mc", q:"¿Qué herramienta Linux alternativa a 'nmap -O' identifica el SO de un host remoto?", opts:["Nikto","Nessus","xprobe2","GFI LANGuard"], a:2, exp:"xprobe2 realiza OS fingerprinting mediante análisis de la pila TCP/IP, alternativa a nmap -O en sistemas Linux." },
      { id:79, unit:1, type:"mc", q:"¿Qué sondeo de fingerprinting de SO envía un FIN a un puerto abierto y analiza si hay respuesta?", opts:["Sondeo ISN","Sondeo Bogus Flag","Sondeo FIN","Tamaño de ventana inicial"], a:2, exp:"Sondeo FIN: RFC dicta que un puerto abierto no debe responder a FIN. Sin embargo, Windows NT responde con FIN/ACK, revelando el SO." },
      { id:80, unit:1, type:"mc", q:"¿Qué sondeo de fingerprinting introduce una bandera TCP indefinida para analizar cómo la procesa el SO?", opts:["Sondeo FIN","Sondeo Bogus Flag","Sondeo ISN","Muestreo ACK"], a:1, exp:"Sondeo Bogus Flag: introduce una flag TCP no definida en un SYN. Algunos SO (como Linux) la devuelven en la respuesta." },
      { id:81, unit:1, type:"mc", q:"¿Cuáles son los niveles de gravedad de las vulnerabilidades CVE según la asignatura?", opts:["Alta, Media, Baja","Crítica, Alta, Media, Baja/Info","Urgente, Importante, Moderada, Baja","Crítica, Grave, Leve"], a:1, exp:"Clasificación CVE: Crítica (permite ejecutar código), Alta (acceso a recursos), Media (info confidencial), Baja/Info (efecto limitado)." },
      { id:82, unit:1, type:"tf", q:"Una vulnerabilidad crítica permite a un atacante ejecutar código arbitrario en el sistema afectado.", a:true, exp:"Nivel Crítico en CVE: permite ejecutar código en el sistema remoto. Son las más peligrosas y requieren parcheo urgente." },
      { id:83, unit:1, type:"mc", q:"¿Qué sitio web es la base de datos de exploits públicos de referencia en ciberseguridad?", opts:["www.cve.mitre.org","www.exploit-db.com","www.incibe-cert.es","www.nvd.nist.gov"], a:1, exp:"exploit-db.com (Offensive Security) es la base de datos de exploits y PoCs públicos más utilizada en ciberseguridad." },
      { id:84, unit:1, type:"tf", q:"CVE-2011-2523 es un backdoor en vsftpd 2.3.4 que se activa con un usuario que contenga ':)'.", a:true, exp:"El backdoor de vsftpd 2.3.4 se activa cuando el nombre de usuario contiene ':)'. Abre una shell en el puerto 6200." },
      { id:85, unit:1, type:"mc", q:"¿En qué puerto abre una shell el backdoor de vsftpd 2.3.4 (CVE-2011-2523)?", opts:["21","22","6200","4444"], a:2, exp:"El backdoor del vsftpd 2.3.4 abre una shell en el puerto 6200 tras activarse con el trigger ':)' en el nombre de usuario." },
      { id:86, unit:1, type:"mc", q:"¿Qué herramienta permite gestionar equipos infectados y propagar ataques (framework C2)?", opts:["Nmap","Cobalt Strike / Armitage","Hydra","Nikto"], a:1, exp:"Cobalt Strike y Armitage son frameworks C2 (Command & Control) que permiten gestionar equipos comprometidos y propagarse." },
      { id:87, unit:1, type:"tf", q:"RFI (Remote File Inclusion) hace que el servidor PHP ejecute código alojado en un servidor remoto del atacante.", a:true, exp:"RFI: el servidor incluye y ejecuta un fichero PHP de un servidor controlado por el atacante. LFI lee ficheros locales del servidor." },
      { id:88, unit:1, type:"mc", q:"¿Qué herramienta automatiza la explotación de SQL Injection extrayendo bases de datos?", opts:["Hydra","sqlmap","Nikto","Nessus"], a:1, exp:"sqlmap automatiza la detección y explotación de SQL Injection: detecta el motor de BD, extrae tablas, columnas y datos." },
      { id:89, unit:1, type:"mc", q:"¿Qué opción de sqlmap lista todas las bases de datos del servidor vulnerable?", opts:["--tables","--dbs","--columns","--dump"], a:1, exp:"sqlmap -u URL --dbs lista todas las bases de datos. --tables lista tablas de una BD, --dump vuelca el contenido." },
      { id:90, unit:1, type:"tf", q:"Un ataque XSS almacenado guarda el código malicioso en la BD para afectar a todos los usuarios que visiten la página.", a:true, exp:"XSS persistente/almacenado: el script queda en la base de datos y se ejecuta en el navegador de cada usuario que cargue la página." },
      { id:91, unit:1, type:"mc", q:"¿Qué herramienta identifica el CMS y versión de tecnologías de un sitio web?", opts:["xHydra","sqlmap","whatweb","Snort"], a:2, exp:"whatweb detecta el CMS (WordPress, Joomla…), versión, servidor web, lenguajes y otras tecnologías del sitio objetivo." },
      { id:92, unit:1, type:"mc", q:"¿Qué hace el comando 'dd if=/dev/zero of=/dev/sdb'?", opts:["Crea una imagen forense del disco sdb","Sobreescribe el disco sdb con ceros borrándolo permanentemente","Formatea el disco sdb en ext4","Verifica el disco sdb"], a:1, exp:"dd if=/dev/zero of=/dev/sdb sobreescribe todo el disco con ceros. Borra los datos de forma irreversible." },
      { id:93, unit:1, type:"mc", q:"¿Qué es el 'pivoting' en un ataque informático?", opts:["Escalada de privilegios en el mismo sistema","Usar un equipo comprometido como trampolín para atacar otros sistemas de la red","Borrar los logs tras el ataque","Instalar un backdoor persistente"], a:1, exp:"Pivoting: el atacante usa un equipo ya comprometido como punto de salto hacia otros equipos de la red interna." },
      { id:94, unit:1, type:"mc", q:"¿Qué hace la técnica 'Pass the Hash'?", opts:["Crackea el hash de contraseña con diccionario","Autentica en Windows usando el hash NTLM sin necesidad de conocer la contraseña en texto plano","Inyecta código en tablas hash de BD","Modifica /etc/shadow"], a:0, exp:"Pass the Hash (PtH) usa el hash NTLM directamente para autenticarse en Windows, sin crackear la contraseña." },
      { id:95, unit:1, type:"tf", q:"GTFOBins muestra cómo usar binarios legítimos de Linux para realizar escaladas de privilegios.", a:true, exp:"GTFOBins (gtfobins.github.io) documenta cómo usar binarios del sistema (vim, python, tar…) para escalar privilegios o evadir restricciones." },
      { id:96, unit:1, type:"mc", q:"¿Qué comando lista las capabilities asignadas a ejecutables en Linux?", opts:["sudo -l","getcap -r / 2>/dev/null","cat /etc/sudoers","uname -a"], a:1, exp:"getcap -r / lista recursivamente los ejecutables con capabilities especiales (p.e. cap_setuid) que permiten escalar privilegios." },
      { id:97, unit:1, type:"mc", q:"¿Qué servicio del sistema puede ser explotado si ejecuta scripts con permisos de root periódicamente?", opts:["/etc/passwd","/etc/crontab","/etc/shadow","/etc/hosts"], a:1, exp:"/etc/crontab ejecuta tareas periódicamente como root. Si el script es editable por usuarios sin privilegios, permite escalada." },
      { id:98, unit:1, type:"mc", q:"¿Qué información devuelve 'uname -a' útil para buscar exploits de escalada de privilegios?", opts:["Lista de usuarios del sistema","Versión del kernel y arquitectura","Servicios en escucha","Ficheros con SUID"], a:1, exp:"uname -a muestra la versión del kernel. Con ese dato se usa linux-exploit-suggester para encontrar exploits aplicables." },
      { id:99, unit:1, type:"tf", q:"Shodan es un buscador que indexa dispositivos IoT y servidores expuestos a Internet con sus versiones de servicios.", a:true, exp:"Shodan indexa dispositivos conectados a Internet mostrando banners, versiones de servicios y vulnerabilidades conocidas." },
      { id:100, unit:1, type:"mc", q:"¿Cuáles son las cuatro categorías de clasificación de ataques de la Unidad 1?", opts:["Ataques a sistemas/servicios, redes, aplicaciones (malware) y servidores web","Ataques físicos, lógicos y sociales","Ataques locales y remotos","Ataques activos y pasivos"], a:0, exp:"Clasificación: contra sistemas/servicios, contra redes, contra aplicaciones (malware) y contra servidores web." },
      { id:101, unit:1, type:"mc", q:"¿Cuál es la diferencia entre una shell bind y una reverse shell en Metasploit?", opts:["Bind: la víctima escucha y el atacante se conecta; Reverse: la víctima llama al atacante","Son equivalentes, solo cambia el cifrado","Bind es para Linux y Reverse para Windows","Bind usa TCP y Reverse usa UDP"], a:0, exp:"Bind shell: la víctima abre un puerto y espera la conexión del atacante. Reverse: la víctima llama al atacante (útil si la víctima está tras NAT)." },
      { id:102, unit:1, type:"mc", q:"¿Qué opción de nmap lanza scripts NSE de detección de vulnerabilidades?", opts:["nmap -sV","nmap -O","nmap --script=vuln","nmap -p-"], a:2, exp:"nmap --script=vuln lanza el conjunto de scripts NSE de vulnerabilidades conocidas contra el objetivo. Detecta Heartbleed, POODLE, etc." },
      { id:103, unit:1, type:"tf", q:"Nikto es un escáner de vulnerabilidades específico para servidores web.", a:true, exp:"Nikto escanea servidores HTTP/HTTPS buscando vulnerabilidades web: ficheros peligrosos, versiones obsoletas, configuraciones inseguras." },
      { id:104, unit:1, type:"mc", q:"¿Qué vulnerabilidad SSL permite un ataque MitM forzando el uso de versiones obsoletas SSLv2/v3?", opts:["Heartbleed","BEAST","POODLE","CRIME"], a:2, exp:"POODLE (Padding Oracle On Downgraded Legacy Encryption) explota SSLv3 para descifrar comunicaciones mediante downgrade." },
      { id:105, unit:1, type:"mc", q:"¿Qué es un 'deface' en ataques web?", opts:["Robo de la base de datos","Modificación visual del aspecto de la página web","Denegación de servicio del servidor","Instalación de backdoor PHP"], a:1, exp:"Deface: el atacante modifica el aspecto visual de la web (como un graffiti digital). Suele usarse para notoriedad o protesta." },
      { id:106, unit:1, type:"mc", q:"¿Qué parámetro de Hydra especifica el fichero de contraseñas a probar?", opts:["--passwords","-w","-P","-L"], a:2, exp:"En Hydra: -P especifica el fichero de contraseñas, -L el fichero de usuarios. Ej: hydra -l admin -P rockyou.txt ssh://IP." },
      { id:107, unit:1, type:"mc", q:"¿Dónde están los diccionarios de contraseñas preinstalados en Kali Linux?", opts:["/usr/share/passwords","/usr/share/wordlists","/etc/wordlists","/opt/wordlists"], a:1, exp:"Kali incluye diccionarios en /usr/share/wordlists/, entre ellos rockyou.txt con millones de contraseñas reales filtradas." },
      { id:108, unit:1, type:"tf", q:"La inyección SQL '1' OR '1'='1' devuelve todos los registros de la tabla porque la condición es siempre verdadera.", a:true, exp:"OR '1'='1' hace que el WHERE sea siempre TRUE, devolviendo todos los registros. Permite saltarse autenticaciones y extraer datos." },
      { id:109, unit:1, type:"mc", q:"¿Qué indica el símbolo '#' en el prompt de Linux?", opts:["Usuario normal","Superusuario (root)","Modo script","Modo interactivo de Python"], a:1, exp:"# en el prompt indica shell de root (superusuario). La escalada de privilegios consiste en pasar de $ (usuario) a # (root)." },
      { id:110, unit:1, type:"mc", q:"¿Qué hace 'sudo -l' en Linux?", opts:["Inicia sesión como root","Lista los comandos que el usuario puede ejecutar con sudo","Cambia la contraseña de root","Muestra los usuarios del sistema"], a:1, exp:"sudo -l lista los permisos sudo del usuario actual. Si aparece '(ALL) NOPASSWD: ALL', el usuario puede ser root directamente." },
      { id:111, unit:1, type:"mc", q:"¿Qué es el 'keylogging'?", opts:["Análisis de logs del sistema","Captura de todas las pulsaciones del teclado para obtener contraseñas","Escaneo de puertos de red","Técnica de cifrado simétrico"], a:1, exp:"Un keylogger registra todas las pulsaciones de teclado, capturando contraseñas, mensajes y datos confidenciales sin que el usuario lo note." },
      { id:112, unit:1, type:"mc", q:"¿Qué es el 'sniffing' de red?", opts:["Escaneo de puertos","Captura pasiva de paquetes para analizar el tráfico","Modificación de paquetes en tránsito","Ataque de fuerza bruta"], a:1, exp:"El sniffing captura pasivamente el tráfico de red (con Wireshark, tcpdump) para analizar credenciales, datos y comunicaciones." },
      { id:113, unit:1, type:"mc", q:"¿Qué es el hijacking de sesión?", opts:["Robo de credenciales por keylogging","Secuestro de sesión autenticada robando el token/cookie sin conocer la contraseña","Ataque DoS contra servidor de sesiones","Inyección SQL en tabla de sesiones"], a:1, exp:"Hijacking de sesión: el atacante roba el token/cookie de sesión de un usuario autenticado para suplantar su identidad." },
      { id:114, unit:1, type:"mc", q:"¿Qué tipo de escaneo nmap es 'sigiloso' porque no completa el handshake TCP?", opts:["nmap -sT (TCP Connect)","nmap -sU (UDP)","nmap -sS (SYN scan)","nmap -sV (versión)"], a:2, exp:"nmap -sS (SYN scan / half-open): envía SYN, recibe SYN/ACK y envía RST sin completar la conexión. No deja registro en los logs de la aplicación." },
      { id:115, unit:1, type:"mc", q:"¿Qué herramienta de Kali permite realizar ataques de fuerza bruta sobre formularios web?", opts:["xHydra","Snort","Nessus","Tripwire"], a:0, exp:"xHydra (GUI de Hydra) soporta fuerza bruta contra HTTP/HTTPS (formularios), SSH, FTP, RDP y muchos otros servicios." },
      { id:116, unit:1, type:"mc", q:"¿Qué herramienta es alternativa a Nessus para análisis de vulnerabilidades open source?", opts:["Nikto","OpenVAS","Snort","Lynis"], a:1, exp:"OpenVAS (Greenbone Vulnerability Manager, versión free) es la alternativa open source más completa a Nessus para análisis de vulnerabilidades." },
      { id:117, unit:1, type:"mc", q:"¿Qué herramienta de WordPress permite auditar plugins vulnerables y hacer fuerza bruta?", opts:["sqlmap","Nikto","WPScan","OWASP ZAP"], a:2, exp:"WPScan es una herramienta específica para WordPress: detecta plugins/temas vulnerables, enumera usuarios y realiza fuerza bruta." },
      { id:118, unit:1, type:"mc", q:"¿Qué es la ingeniería social en ciberseguridad?", opts:["Explotar vulnerabilidades de software","Manipular psicológicamente a personas para obtener acceso o información","Atacar infraestructura física","Romper cifrado mediante fuerza bruta"], a:1, exp:"Ingeniería social manipula a las personas (phishing, pretexting, vishing) para obtener credenciales sin exploits técnicos." },
      { id:119, unit:1, type:"mc", q:"¿Cuál es el identificador único de una vulnerabilidad en la base de datos pública?", opts:["BUG-YYYY-NNNNN","CVE-YYYY-NNNNN","MS-NUMERO-TIPO","VULN-TIPO-NUMERO"], a:1, exp:"El formato CVE es CVE-AÑO-NÚMERO (p.e. CVE-2011-2523). Lo gestiona MITRE y lo publica NVD (nvd.nist.gov)." },
      { id:120, unit:1, type:"mc", q:"¿Qué opción de nmap identifica la versión de cada servicio activo?", opts:["nmap -O","nmap -sV","nmap -sS","nmap -p-"], a:1, exp:"nmap -sV (service version detection) interroga cada servicio para identificar su versión: 'Apache httpd 2.4.52', 'OpenSSH 8.4p1', etc." },

      // ===== UNIDAD 2 AMPLIACIÓN =====
      { id:121, unit:2, type:"mc", q:"¿Cuáles son los 5 niveles de seguridad de la Unidad 2?", opts:["Física, Host, Perimetral, Servicios, Datos","Red, Aplicación, Host, Datos, Backup","Física, Lógica, Red, Aplicación, Usuario","Acceso, Autenticación, Cifrado, Monitorización, Backup"], a:0, exp:"Niveles: Datos (ACL, RAID, cifrado), Servicios (configuración), Perimetral (firewall, NIDS), Host (autenticación, HIDS) y Física (CPD)." },
      { id:122, unit:2, type:"tf", q:"Un CPD suele tener control de acceso biométrico, racks, alimentación redundante y sistema antiincendios.", a:true, exp:"El CPD (Centro de Proceso de Datos) concentra los servidores de la empresa y requiere las máximas medidas de seguridad física." },
      { id:123, unit:2, type:"mc", q:"¿Qué sistema antiincendios se usa en CPDs para no dañar los equipos electrónicos?", opts:["CO2","Espuma","Novec 1230 o HFC 227","Agua nebulizada"], a:2, exp:"Los CPDs usan gases como Novec 1230 (FK-5-1-12) o HFC 227ea que suprimen el fuego sin dañar equipos ni dejar residuos." },
      { id:124, unit:2, type:"mc", q:"¿Qué comando de Linux hace que un fichero de configuración sea inmutable (no modificable ni por root)?", opts:["chmod 000","chattr +i","chown root","chmod -w"], a:1, exp:"chattr +i establece el atributo inmutable: ningún proceso (ni root) puede modificar o borrar el fichero. Se revierte con chattr -i." },
      { id:125, unit:2, type:"mc", q:"¿Qué herramienta calcula checksums de ficheros críticos y alerta si son modificados?", opts:["Lynis","tripwire","fail2ban","chkrootkit"], a:1, exp:"tripwire calcula checksums de binarios y configs al instalar, comparando periódicamente para detectar cambios no autorizados (HIDS)." },
      { id:126, unit:2, type:"tf", q:"John the Ripper puede usarse para comprobar la fortaleza de las contraseñas del sistema atacando /etc/shadow.", a:true, exp:"John the Ripper realiza ataques de diccionario y fuerza bruta sobre /etc/shadow para detectar contraseñas débiles en el propio sistema." },
      { id:127, unit:2, type:"mc", q:"¿Qué hace MASQUERADE en iptables NAT?", opts:["Bloquea todo el tráfico entrante","Permite a la red interna salir a Internet con la IP pública del router (NAT dinámico)","Redirige el tráfico al servidor interno","Registra todos los paquetes"], a:1, exp:"MASQUERADE en POSTROUTING hace NAT dinámico: cambia la IP origen de los paquetes de la red interna por la IP del router." },
      { id:128, unit:2, type:"mc", q:"¿Cuál es la diferencia entre PREROUTING y POSTROUTING en iptables NAT?", opts:["PREROUTING es para IPv4; POSTROUTING para IPv6","PREROUTING actúa antes del enrutado (publicar servidores); POSTROUTING después (NAT de salida)","PREROUTING es más rápido","No hay diferencia"], a:1, exp:"PREROUTING: intercepta paquetes antes de enrutar → DNAT (publicar servidores). POSTROUTING: tras el enrutado → MASQUERADE/SNAT (salida)." },
      { id:129, unit:2, type:"mc", q:"¿Qué comando iptables muestra todas las reglas activas?", opts:["iptables --show","iptables -F","iptables -L","iptables -D"], a:2, exp:"iptables -L muestra todas las cadenas y reglas. iptables -t nat -L muestra las reglas NAT." },
      { id:130, unit:2, type:"tf", q:"'iptables -F' elimina todas las reglas de iptables pero mantiene las políticas por defecto.", a:true, exp:"iptables -F (flush) borra las reglas pero NO cambia las políticas (-P). Si las políticas son ACCEPT, el tráfico seguirá pasando tras el flush." },
      { id:131, unit:2, type:"mc", q:"¿En qué fichero persisten las reglas iptables en Debian/Ubuntu con iptables-persistent?", opts:["/etc/iptables.conf","/etc/iptables/rules.v4","/etc/network/iptables","/etc/firewall/rules"], a:1, exp:"Con el paquete iptables-persistent, las reglas se guardan en /etc/iptables/rules.v4 y se restauran automáticamente al arrancar." },
      { id:132, unit:2, type:"mc", q:"¿Qué hace '-j LOG --log-prefix \"IPTABLES\"' en una regla iptables?", opts:["Bloquea y registra el paquete","Registra el paquete en syslog con el prefijo indicado, sin bloquearlo","Acepta el paquete y envía copia al log","Redirige el paquete a otro servidor"], a:1, exp:"LOG solo registra en syslog con el prefijo dado, NO bloquea el paquete. Para bloquear y registrar se usan dos reglas: LOG + DROP." },
      { id:133, unit:2, type:"mc", q:"¿Qué tres topologías de seguridad perimetral se estudian?", opts:["Firewall simple, DMZ y VPN","Router de protección, zona neutra (DMZ) y split screened subnet","Proxy, NAT y VPN","IDS, IPS y firewall"], a:1, exp:"Topologías perimetrales: Router de protección (simple), Zona neutra/DMZ (dos routers + servidores expuestos) y Split screened subnet." },
      { id:134, unit:2, type:"mc", q:"¿Qué es un proxy inverso (reverse proxy)?", opts:["Intermediario entre cliente e Internet","Servidor que recibe conexiones externas y las reenvía al servidor interno real","Router que filtra paquetes de la DMZ","IDS que inspecciona HTTP"], a:1, exp:"El proxy inverso (nginx, IIS) expone públicamente los servicios internos ocultando la IP y arquitectura del servidor real." },
      { id:135, unit:2, type:"tf", q:"VyOS es una distribución de enrutamiento basada en Debian con CLI similar a Juniper/Cisco.", a:true, exp:"VyOS está basado en Debian y tiene un CLI de configuración similar a Juniper (configure, commit, save) soportando BGP, OSPF, VPN, IDS, etc." },
      { id:136, unit:2, type:"mc", q:"¿Cuáles son los tres tipos de conexión VPN?", opts:["Host-a-host, host-a-red y red-a-red","LAN-a-LAN, WAN-a-WAN y punto-a-punto","Site-to-site, L2TP y PPTP","IPSec, OpenVPN y WireGuard"], a:0, exp:"VPN: Host a red (acceso remoto), Host a host (comunicación segura entre dos equipos) y Red a red (site-to-site)." },
      { id:137, unit:2, type:"mc", q:"¿Qué herramienta analiza el sistema de ficheros Linux buscando formas de obtener root (SUID, rootkits)?", opts:["Tripwire","Tiger","Lynis","Nessus"], a:1, exp:"Tiger analiza el sistema en busca de ficheros SUID/SGID peligrosos, configuraciones débiles y posibles vectores de escalada (rootkits)." },
      { id:138, unit:2, type:"mc", q:"¿Dónde deben estar las contraseñas cifradas de Linux para mayor seguridad?", opts:["En /etc/passwd (accesible por todos)","En /etc/shadow (solo accesible por root)","En /etc/group","En cualquiera de los dos"], a:1, exp:"/etc/shadow almacena los hashes de contraseñas con permisos restrictivos (solo root). pwconv mueve contraseñas de passwd a shadow." },
      { id:139, unit:2, type:"mc", q:"¿Qué colores usa IPCop para sus interfaces de red?", opts:["Rojo=LAN, Verde=Internet, Naranja=DMZ, Azul=WiFi","Verde=LAN, Azul=WiFi, Naranja=DMZ, Rojo=Internet","Verde=Internet, Rojo=LAN, Azul=DMZ, Naranja=WiFi","Todos los colores son equivalentes"], a:1, exp:"IPCop: GREEN=LAN interna, BLUE=Red inalámbrica, ORANGE=DMZ, RED=Internet (exterior)." },
      { id:140, unit:2, type:"tf", q:"Las credenciales por defecto de pfsense son admin/pfsense.", a:true, exp:"pfsense usa admin/pfsense por defecto. Deben cambiarse inmediatamente en el primer acceso. La interfaz web está en http://10.0.0.1." },
      { id:141, unit:2, type:"mc", q:"¿Qué hace 'Port Forward' en pfsense?", opts:["Crea una VPN","Redirige tráfico de un puerto de la WAN a un servidor de la LAN","Bloquea puertos específicos","Monitoriza el tráfico"], a:1, exp:"Port Forward (DNAT) en pfsense redirecciona el tráfico entrante de un puerto de la WAN a un servidor específico de la red interna." },
      { id:142, unit:2, type:"mc", q:"¿Qué protocolo de enrutamiento avanzado implementa VyOS mediante Quagga?", opts:["RIP únicamente","BGP, OSPF y RIP","EIGRP y BGP","Solo rutas estáticas"], a:1, exp:"VyOS implementa BGP, OSPF y RIP usando el daemon Quagga, además de IPS (Snort), VPN (OpenVPN, IPSec), QoS y VLAN." },
      { id:143, unit:2, type:"mc", q:"¿Qué nivel de seguridad incluye el control de acceso al CPD y los sistemas antiincendios?", opts:["Nivel de Datos","Nivel Perimetral","Nivel Host","Nivel Físico"], a:3, exp:"El nivel de seguridad física protege el hardware: acceso biométrico al CPD, aislamientos térmicos, SAI, sistemas antiincendios." },
      { id:144, unit:2, type:"tf", q:"Instalar únicamente los servicios necesarios reduce la superficie de ataque del servidor.", a:true, exp:"Principio de mínima exposición: cada servicio adicional es un vector de ataque potencial. Solo instalar lo estrictamente necesario." },
      { id:145, unit:2, type:"mc", q:"¿Cuál es la diferencia principal entre VyOS y pfsense?", opts:["VyOS es de pago y pfsense gratuito","VyOS usa CLI tipo Juniper (Debian); pfsense usa interfaz web (FreeBSD)","VyOS solo es router; pfsense también IDS","No hay diferencias"], a:1, exp:"VyOS (Debian, CLI Juniper-style) y pfsense (FreeBSD, interfaz web amigable) son ambos gratuitos y usados como distribuciones de enrutamiento." },
      { id:146, unit:2, type:"mc", q:"¿Qué interfaz web de administración se menciona junto con pfsense para gestionar Linux?", opts:["Nagios","Lynis","webmin","Centreon"], a:2, exp:"webmin es una interfaz web para administrar sistemas Unix/Linux, incluyendo iptables, usuarios, servicios y ficheros." },
      { id:147, unit:2, type:"mc", q:"¿Qué hace la 'enjaulación' (jail/chroot) de servicios?", opts:["Bloquea el servicio tras detectar un ataque","Limita el sistema de ficheros accesible usando chroot","Cifra el tráfico del servicio","Deshabilita el servicio temporalmente"], a:1, exp:"chroot jail limita el directorio raíz del servicio: si es comprometido, el atacante no puede acceder al resto del sistema de ficheros." },
      { id:148, unit:2, type:"mc", q:"¿Qué fichero de fail2ban configura el número de intentos y tiempo de baneo por servicio?", opts:["fail2ban.conf","jail.conf","services.conf","banned.conf"], a:1, exp:"jail.conf contiene la configuración por servicio: maxretry (intentos), bantime (duración del baneo), findtime (ventana de tiempo)." },
      { id:149, unit:2, type:"mc", q:"¿Qué hace 'iptables -t nat -A POSTROUTING -s 10.0.0.0/24 -j MASQUERADE'?", opts:["Redirige el puerto 80 al servidor interno","Permite a la red 10.0.0.0/24 salir a Internet mediante NAT","Bloquea la red 10.0.0.0/24","Registra el tráfico de la red interna"], a:1, exp:"MASQUERADE en POSTROUTING aplica NAT de salida: los paquetes de la red interna salen con la IP pública del router." },
      { id:150, unit:2, type:"mc", q:"¿Para qué se cambia el banner (pancarta) de servicios como SSH o SMTP?", opts:["Para mejorar la velocidad del servicio","Para ocultar la versión del software y dificultar la identificación de vulnerabilidades","Para cumplir con el RGPD","Para reducir el consumo de recursos"], a:1, exp:"Cambiar el banner oculta la versión y tipo de software, dificultando al atacante buscar exploits específicos para esa versión." },
      { id:151, unit:2, type:"tf", q:"Un proxy trabaja en la capa de aplicación y puede filtrar tráfico por contenido.", a:true, exp:"Al operar en capa 7 (aplicación), el proxy puede inspeccionar el contenido HTTP y filtrar por URL, palabras clave o tipo de fichero." },
      { id:152, unit:2, type:"mc", q:"¿Qué hace 'pwconv' en Linux?", opts:["Cambia la contraseña del usuario actual","Mueve los hashes de contraseñas de /etc/passwd a /etc/shadow","Convierte el formato de contraseñas a SHA-512","Elimina cuentas sin contraseña"], a:1, exp:"pwconv migra los hashes de contraseñas del fichero /etc/passwd (visible por todos) al /etc/shadow (solo accesible por root)." },
      { id:153, unit:2, type:"mc", q:"¿Qué permite configurar el SAI (UPS) en un CPD?", opts:["Control de acceso biométrico","Alimentación eléctrica ininterrumpida ante cortes de luz","Monitorización de temperatura","Sistema antiincendios automático"], a:1, exp:"El SAI (Sistema de Alimentación Ininterrumpida / UPS) proporciona electricidad de batería durante cortes, evitando apagados bruscos." },
      { id:154, unit:2, type:"mc", q:"¿Qué herramienta específica detecta rootkits en sistemas Linux?", opts:["Lynis","chkrootkit","tripwire","nmap"], a:1, exp:"chkrootkit y rkhunter son herramientas específicas para detectar rootkits: buscan ficheros ocultos, procesos manipulados, etc." },

      // ===== UNIDAD 3 AMPLIACIÓN =====
      { id:155, unit:3, type:"mc", q:"¿Cómo se llamaba la primera versión de Snort (1998)?", opts:["NetSnort","APE","PacketSniffer","EasyIDS"], a:1, exp:"Marty Roech desarrolló en 1998 la primera versión, llamada APE, que evolucionó a Snort. Actualmente es propiedad de Cisco." },
      { id:156, unit:3, type:"mc", q:"¿Bajo qué licencia está disponible Snort?", opts:["MIT","Apache 2.0","GPL","Propietaria de Cisco"], a:2, exp:"Snort está disponible bajo licencia GPL (GNU General Public License), aunque Cisco lo adquirió en 2023." },
      { id:157, unit:3, type:"mc", q:"¿Cuál es el directorio de configuración principal de Snort en Linux?", opts:["/var/log/snort","/etc/snort","/usr/share/snort","/opt/snort"], a:1, exp:"/etc/snort contiene la configuración (snort.conf) y las reglas (/etc/snort/rules). Los logs van a /var/log/snort." },
      { id:158, unit:3, type:"mc", q:"¿Qué hace el comando 'snort -v'?", opts:["Muestra la versión de Snort","Inicia Snort en modo NIDS","Ejecuta Snort en modo sniffer mostrando paquetes en consola","Actualiza las reglas"], a:2, exp:"snort -v ejecuta Snort en modo sniffer (modo 1): captura y muestra los encabezados de los paquetes en la consola." },
      { id:159, unit:3, type:"mc", q:"¿Qué comando ejecuta Snort en modo NIDS con su fichero de configuración?", opts:["snort -v","snort --nids","snort -dev -c snort.conf","snort -start"], a:2, exp:"snort -dev -c snort.conf ejecuta Snort en modo NIDS (modo 3): analiza el tráfico según las reglas del fichero de configuración." },
      { id:160, unit:3, type:"mc", q:"¿Qué paquete convierte Snort en IPS (modo Inline)?", opts:["snort-ips","fwsnort","snort-inline","iptables-snort"], a:1, exp:"fwsnort permite a Snort operar en modo Inline con iptables, convirtiéndolo de IDS pasivo a IPS activo que bloquea paquetes." },
      { id:161, unit:3, type:"mc", q:"¿Cuál es la ventaja de la detección de anomalías frente a la de patrones?", opts:["Menos falsos positivos","Puede detectar ataques nuevos (0-day) desconocidos","Requiere menos recursos","Más fácil de configurar"], a:1, exp:"Detección de anomalías: aprende el comportamiento normal y detecta desviaciones → puede descubrir ataques nuevos no catalogados." },
      { id:162, unit:3, type:"mc", q:"¿Cuál es la principal desventaja de la detección de anomalías?", opts:["No detecta ataques conocidos","Genera falsos positivos (comportamientos legítimos infrecuentes disparan alarmas)","No funciona en tiempo real","No puede bloquear paquetes"], a:1, exp:"La detección de anomalías genera falsos positivos: comportamientos legítimos pero inusuales pueden interpretarse como ataques." },
      { id:163, unit:3, type:"mc", q:"¿Qué parte de una regla Snort identifica protocolo, IPs y puertos de origen/destino?", opts:["Opciones (options)","Cabecera (header)","Payload","Metadata"], a:1, exp:"La cabecera de la regla Snort especifica: acción (alert/drop), protocolo, IP origen, puerto origen, IP destino y puerto destino." },
      { id:164, unit:3, type:"mc", q:"¿Qué hace el campo 'content' en una regla Snort?", opts:["Indica la IP origen","Especifica el SID","Busca una cadena específica en el payload del paquete","Define la acción de respuesta"], a:2, exp:"content: busca texto o bytes hexadecimales en el payload del paquete. Es la opción de detección más importante en Snort." },
      { id:165, unit:3, type:"tf", q:"Las variables de red en snort.conf permiten personalizar los rangos IP de la red monitorizada.", a:true, exp:"Variables como HOME_NET, EXTERNAL_NET, HTTP_SERVERS en snort.conf adaptan las reglas a la red específica, mejorando precisión y rendimiento." },
      { id:166, unit:3, type:"mc", q:"¿Qué herramienta monitoriza la disponibilidad de servicios de red y envía alertas cuando fallan?", opts:["Snort","Tripwire","Nagios","Fail2ban"], a:2, exp:"Nagios monitoriza hosts y servicios (HTTP, DNS, SSH, etc.) enviando alertas por email/SMS cuando detecta fallos de disponibilidad." },
      { id:167, unit:3, type:"mc", q:"¿Cuál es la diferencia entre IDS pasivo y activo (IPS)?", opts:["Pasivo solo alerta; activo (IPS) puede bloquear tráfico malicioso","Pasivo monitoriza red; activo monitoriza host","Pasivo usa firmas; activo usa anomalías","No hay diferencia"], a:0, exp:"IDS pasivo: detecta y genera alertas. IDS activo (IPS): detecta Y bloquea/rechaza el tráfico malicioso en tiempo real." },
      { id:168, unit:3, type:"mc", q:"¿Qué herramienta es alternativa moderna a Snort para NIDS/IPS?", opts:["OSSEC","Zeek (Bro)","Suricata","Tripwire"], a:2, exp:"Suricata es el NIDS/NIPS moderno más popular junto a Snort. Compatible con reglas Snort, soporta multihilo y puede actuar como IPS." },
      { id:169, unit:3, type:"mc", q:"¿Dónde se recomienda ubicar el NIDS para máxima visibilidad del tráfico?", opts:["Detrás del firewall en la red interna","Antes del router","Entre el router/firewall y el switch de la red interna","En el mismo servidor web"], a:2, exp:"El NIDS se ubica entre el router/firewall y el switch interno (usando port mirroring) para analizar todo el tráfico de la red." },
      { id:170, unit:3, type:"tf", q:"md5sum puede usarse como HIDS básico para detectar cambios no autorizados en ficheros críticos.", a:true, exp:"Calcular md5sum de binarios y configs al instalar, y comparar periódicamente, permite detectar modificaciones no autorizadas." },
      { id:171, unit:3, type:"mc", q:"¿Cuántos modos de ejecución tiene Snort contando el modo Inline?", opts:["2","3","4","5"], a:2, exp:"4 modos: Sniffer (muestra paquetes en pantalla), Packet Logger (guarda al disco), NIDS (analiza y alerta) e Inline/IPS (bloquea con iptables)." },
      { id:172, unit:3, type:"mc", q:"¿Cuál es el directorio donde Snort guarda las reglas?", opts:["/etc/snort","/etc/snort/rules","/var/log/snort","/usr/local/snort/rules"], a:1, exp:"/etc/snort/rules contiene los ficheros .rules de Snort. La ruta se configura en snort.conf. Se actualizan con oinkmaster." },
      { id:173, unit:3, type:"mc", q:"¿Para qué sirve 'oinkmaster' con Snort?", opts:["Genera tráfico de test","Actualiza automáticamente las reglas de Snort desde el servidor oficial","Frontend web de alertas","Convierte Snort a modo IPS"], a:1, exp:"oinkmaster descarga y actualiza las reglas de Snort (snortrules-snapshot.tar.gz) automáticamente desde el servidor de Snort/Cisco." },
      { id:174, unit:3, type:"mc", q:"¿Cuáles son las cuatro acciones principales de una regla Snort?", opts:["allow, deny, log, mirror","alert, pass, log, drop","accept, reject, drop, alert","allow, block, monitor, forward"], a:1, exp:"Acciones Snort: alert (alerta + log), pass (ignora), log (solo registra) y drop (en modo IPS, descarta el paquete)." },
      { id:175, unit:3, type:"mc", q:"¿Qué función tiene el 'port mirroring' (SPAN port) del switch para un NIDS?", opts:["Duplica la velocidad del puerto","Replica todo el tráfico del switch al puerto donde está el NIDS","Bloquea el tráfico sospechoso","Permite gestión remota del switch"], a:1, exp:"Port mirroring/SPAN: el switch replica todo el tráfico a un puerto específico donde está conectado el NIDS para su análisis." },
      { id:176, unit:3, type:"tf", q:"Suricata es compatible con el formato de reglas de Snort.", a:true, exp:"Suricata puede usar las mismas reglas .rules de Snort, facilitando la migración y el uso de reglas de la comunidad ET (Emerging Threats)." },
      { id:177, unit:3, type:"mc", q:"¿Qué frontend web permite visualizar las alertas de Snort en modo gráfico?", opts:["Nagios","ACID/BASE","Centreon","Webmin"], a:1, exp:"ACID (Analysis Console for Intrusion Databases) y BASE son frontends web para visualizar y analizar las alertas generadas por Snort." },
      { id:178, unit:3, type:"mc", q:"¿Qué herramienta genera tráfico de test para verificar que Snort funciona correctamente?", opts:["IDSwakeup","Nessus","Metasploit","Legion"], a:0, exp:"IDSwakeup es una herramienta benchmark que envía tráfico de ataque simulado para comprobar que el NIDS detecta correctamente las alertas." },
      { id:179, unit:3, type:"tf", q:"Un IDS distribuido tiene múltiples sensores que reportan a un punto central de correlación.", a:true, exp:"IDS distribuido: sensores en distintos segmentos de red envían datos a un correlador central que analiza el conjunto de alertas." },
      { id:180, unit:3, type:"mc", q:"¿Cuál es el fichero de alerta por defecto de Snort?", opts:["/etc/snort/alert","/var/log/snort/alert","/usr/local/snort/alerts","/tmp/snort.log"], a:1, exp:"Snort guarda las alertas en /var/log/snort/alert (modo -A full). El formato y destino se configura en la sección output de snort.conf." },

      // ===== UNIDAD 4 AMPLIACIÓN =====
      { id:181, unit:4, type:"mc", q:"¿Cuál es la ventaja de la copia COMPLETA frente a otros tipos?", opts:["Ocupa menos espacio","La recuperación total y parcial es directa y sencilla","Es más rápida de realizar","Permite más versiones del fichero"], a:1, exp:"Copia completa: tiene todos los ficheros. La restauración (total o de un único fichero) no requiere aplicar copias adicionales." },
      { id:182, unit:4, type:"mc", q:"¿Cuál es la desventaja de la copia incremental respecto a la restauración?", opts:["Ocupa mucho espacio","Para restaurar se necesita la copia completa + TODAS las incrementales en orden cronológico","Tarda mucho en realizarse","No conserva versiones de ficheros"], a:1, exp:"La restauración incremental requiere aplicar: copia completa + incremental 1 + incremental 2 + … en orden. Más pasos = más tiempo." },
      { id:183, unit:4, type:"mc", q:"¿Qué herramienta GNU/Linux copia un disco bit a bit incluyendo espacio vacío?", opts:["tar","rsync","dd","dump"], a:2, exp:"dd if=/dev/sda of=/dev/sdb copia sector a sector (bit a bit) el disco entero, incluyendo la tabla de particiones y espacio libre." },
      { id:184, unit:4, type:"mc", q:"¿Qué herramienta de backup Linux permite restaurar ficheros de forma interactiva seleccionándolos?", opts:["tar","dd","dump/restore","rsync"], a:2, exp:"dump 0f /copia.dump /datos realiza la copia. restore -i -f /copia.dump abre un modo interactivo para seleccionar ficheros a restaurar." },
      { id:185, unit:4, type:"mc", q:"¿Qué opción de mysqldump hace backup completo de TODAS las bases de datos?", opts:["mysqldump -u root -p > backup.sql","mysqldump --all-databases > backup.sql","mysqldump -u root -p --all > backup.sql","mysqldump -a > backup.sql"], a:1, exp:"mysqldump --all-databases > fichero.sql exporta todas las BD. Para restaurar: mysql -u root -p < fichero.sql" },
      { id:186, unit:4, type:"mc", q:"¿Qué significa '0 * * * *' en el formato crontab?", opts:["Una vez al día a medianoche","Una vez por hora (en punto)","Una vez a la semana","Una vez al mes"], a:1, exp:"Crontab: MINUTO HORA DIA MES DIA_SEM. '0 * * * *' = minuto 0, cualquier hora = se ejecuta cada hora en punto." },
      { id:187, unit:4, type:"tf", q:"DRBD permite replicar un sistema de ficheros en tiempo real entre dos servidores.", a:true, exp:"DRBD (Distributed Replicated Block Device) sincroniza bloques de datos en tiempo real entre servidores, útil para alta disponibilidad y backup." },
      { id:188, unit:4, type:"mc", q:"¿Qué distribución LiveCD se menciona como la más potente para clonar y restaurar sistemas?", opts:["FreeNAS","Clonezilla","Amanda","DRBD"], a:1, exp:"Clonezilla es la distribución LiveCD GPL más utilizada para clonar y restaurar discos y particiones, soportando múltiples sistemas de ficheros." },
      { id:189, unit:4, type:"mc", q:"¿Qué herramienta de backup automatizado informa por email al completar las copias?", opts:["rsync","tar","Amanda","DRBD"], a:2, exp:"Amanda (Advanced Maryland Automatic Network Disk Archiver) automatiza backups de múltiples servidores y notifica por email los resultados." },
      { id:190, unit:4, type:"mc", q:"¿Cuál de las siguientes es una MALA práctica de copias de seguridad?", opts:["Probar la restauración periódicamente","Guardar las copias en el mismo recinto físico que los originales","Realizar las copias fuera del horario laboral","Usar herramientas estándar del sistema"], a:1, exp:"Guardar copias en el mismo lugar es una mala práctica: un incendio, inundación o robo destruiría tanto los datos originales como las copias." },
      { id:191, unit:4, type:"mc", q:"¿Cuántos discos mínimo necesita RAID 5?", opts:["2","3","4","5"], a:1, exp:"RAID 5 requiere mínimo 3 discos. La paridad se distribuye entre todos, tolerando el fallo de cualquier disco único." },
      { id:192, unit:4, type:"mc", q:"¿Qué es un NAS (Network Attached Storage)?", opts:["Un tipo de RAID de alta velocidad","Dispositivo de almacenamiento en red con RAID para centralizar copias de múltiples servidores","Un protocolo de backup remoto","Una distribución LiveCD de recuperación"], a:1, exp:"El NAS centraliza el almacenamiento en red usando RAID, permitiendo que múltiples servidores realicen sus copias en un único punto seguro." },
      { id:193, unit:4, type:"mc", q:"¿Qué comando mdadm crea un RAID 1 con dos discos?", opts:["mdadm -Cv /dev/md0 -l5 -n2 /dev/sdb /dev/sdc","mdadm -Cv /dev/md0 -l1 -n2 /dev/sdb /dev/sdc","mdadm --create /dev/md0 --raid1 /dev/sdb","mdadm -R /dev/md0 /dev/sdb /dev/sdc"], a:1, exp:"mdadm -Cv /dev/md0 -l1 -n2 /dev/sdb /dev/sdc crea RAID 1 (mirroring) con 2 discos. -l = nivel, -n = número de discos." },
      { id:194, unit:4, type:"tf", q:"La copia diferencial copia los ficheros modificados desde la última copia COMPLETA (no desde la última copia de cualquier tipo).", a:true, exp:"Diferencial: referencia la última COMPLETA (nivel 1). Incremental: referencia la última copia (sea del tipo que sea). Por eso la diferencial crece con el tiempo." },
      { id:195, unit:4, type:"mc", q:"¿Qué hace el comando 'restore -t -f /copia.dump'?", opts:["Restaura todos los ficheros","Lista el contenido sin restaurar nada","Crea una copia incremental","Verifica la integridad de la copia"], a:1, exp:"restore -t -f lista el contenido del dump sin restaurar. -x restaura todo, -i permite selección interactiva." },
      { id:196, unit:4, type:"mc", q:"¿Qué sistema operativo usa FreeNAS (ahora TrueNAS) como base?", opts:["Debian","Ubuntu","FreeBSD","CentOS"], a:2, exp:"FreeNAS/TrueNAS está basado en FreeBSD. Proporciona servidor NAS con RAID, soporte CIFS/NFS/iSCSI/FTP y puede funcionar como LiveCD." },
      { id:197, unit:4, type:"mc", q:"¿Qué herramienta permite ver el estado detallado de un RAID software en Linux?", opts:["fdisk -l","mdadm --detail /dev/md0","df -h","lsblk"], a:1, exp:"mdadm --detail /dev/md0 muestra: nivel RAID, número de discos, estado (activo/degradado/reconstruyendo), y estado de cada disco." },
      { id:198, unit:4, type:"mc", q:"¿Cuántos discos puede perder un RAID 1 de 2 discos y seguir funcionando?", opts:["0","1","2","Ninguno"], a:1, exp:"RAID 1 (mirroring) con 2 discos tolera el fallo de 1 disco. Los datos están en ambos discos simultáneamente." },
      { id:199, unit:4, type:"mc", q:"¿Qué comando guarda las reglas mdadm de forma permanente en su fichero de configuración?", opts:["mdadm --save","mdadm -Es > /etc/mdadm/mdadm.conf","mdadm --persist","mdadm --write-config"], a:1, exp:"mdadm -Es > /etc/mdadm/mdadm.conf guarda la configuración del RAID para que se monte automáticamente al reiniciar." },
      { id:200, unit:4, type:"mc", q:"¿Para qué sirve rsync en el contexto de copias de seguridad?", opts:["Clona discos bit a bit","Sincroniza directorios de forma eficiente transfiriendo solo los cambios","Comprime la copia en formato tgz","Gestiona el RAID por software"], a:1, exp:"rsync sincroniza directorios entre equipos (sobre SSH), transfiriendo solo los bloques modificados, lo que lo hace muy eficiente para backups incrementales." },

      // ===== UNIDAD 5 AMPLIACIÓN =====
      { id:201, unit:5, type:"mc", q:"¿Qué herramienta forense tiene 21 comandos en 4 categorías (data unit, metadata, file name, file system)?", opts:["Autopsy","Sleuthkit","FTK","EnCase"], a:1, exp:"Sleuthkit tiene 21 herramientas en 4 categorías: data unit (bloques), metadata (inodos), file name (listados) y file system (info global)." },
      { id:202, unit:5, type:"mc", q:"¿Cuál es la principal ventaja de Autopsy sobre usar Sleuthkit directamente?", opts:["Es más rápido","Solo funciona en Windows","Organiza investigaciones en casos, mantiene logs y permite navegar ficheros borrados","Es gratuito mientras Sleuthkit es de pago"], a:2, exp:"Autopsy proporciona interfaz web que organiza casos, registra acciones de investigadores, permite navegar ficheros borrados y crear timelines." },
      { id:203, unit:5, type:"mc", q:"¿Qué fichero de log registra los intentos de autenticación SSH en Red Hat/CentOS?", opts:["/var/log/auth.log","/var/log/secure","/var/log/syslog","/var/log/kern.log"], a:1, exp:"/var/log/secure (Red Hat/CentOS) o /var/log/auth.log (Debian/Ubuntu) registra conexiones SSH, sudo, su y otros intentos de autenticación." },
      { id:204, unit:5, type:"tf", q:"Los ficheros 'borrados' pueden recuperarse si el espacio en disco no ha sido sobreescrito.", a:true, exp:"Borrar un fichero solo elimina la referencia en el directorio. El contenido del bloque de disco persiste hasta ser sobreescrito por nuevos datos." },
      { id:205, unit:5, type:"mc", q:"¿Para qué sirve 'chroot /ataque' en análisis forense?", opts:["Copia el sistema comprometido","Cambia el directorio raíz al sistema montado para ejecutar comandos del sistema comprometido","Verifica el hash MD5 de la imagen","Busca ficheros borrados"], a:1, exp:"chroot /ataque cambia el root al sistema forense montado, permitiendo ejecutar rpm, apt, etc. del SO comprometido para análisis." },
      { id:206, unit:5, type:"mc", q:"¿Cómo se detecta que el atacante borró entradas de los logs del sistema?", opts:["Los logs son inusualmente grandes","Existe un salto en la secuencia de fechas del log","Los logs tienen permisos incorrectos","Los logs contienen caracteres extraños"], a:1, exp:"Un salto en las fechas del /var/log/messages (p.e. de 23/8 a 25/8 sin el 24/8) indica que el atacante modificó o borró entradas." },
      { id:207, unit:5, type:"mc", q:"¿Cuál es el orden correcto de recopilación de evidencias forenses?", opts:["Primero disco, luego RAM","Primero RAM y evidencias volátiles (se pierden al apagar), luego imagen del disco","Primero logs, luego todo lo demás","El orden no importa"], a:1, exp:"Orden de volatilidad: RAM > conexiones red > procesos > swap > disco. Se recoge primero lo más volátil porque se pierde al apagar." },
      { id:208, unit:5, type:"mc", q:"¿Qué hace 'mount -oloop 192.168.3.10-hda1.dd /ataque/' en análisis forense?", opts:["Crea una imagen del disco","Monta la imagen .dd como unidad de disco para analizar su contenido sin modificarla","Verifica la integridad de la imagen","Descifra la imagen forense"], a:1, exp:"mount -oloop monta el fichero .dd como dispositivo de bloque en modo solo lectura (con -o ro) para explorar su contenido forense." },
      { id:209, unit:5, type:"tf", q:"El análisis forense se realiza sobre una imagen copia del disco, nunca sobre el disco original.", a:true, exp:"Trabajar sobre el original contaminaría las evidencias (timestamps, etc.). El análisis se hace sobre copias .dd verificadas con md5sum." },
      { id:210, unit:5, type:"mc", q:"¿Qué tipo de directorio crea un atacante para ocultar herramientas en Linux?", opts:["Directorio con nombre largo","Directorio oculto con nombre engañoso como '/root/.,'","Directorio en /tmp con permisos 777","Directorio llamado 'system' en /usr"], a:1, exp:"Los atacantes crean directorios como '/root/.,' (punto-coma) que parecen entradas del sistema pero son directorios ocultos con herramientas maliciosas." },
      { id:211, unit:5, type:"mc", q:"¿Qué es un 'bouncer IRC' (psyBNC) instalado por un atacante?", opts:["Servidor de chat personal","Proxy para ocultar la IP real del atacante en comunicaciones IRC","Herramienta de escaneo de red","Rootkit para persistencia"], a:1, exp:"psyBNC es un bouncer IRC: actúa como proxy entre el atacante y los servidores IRC, ocultando la IP real del atacante." },
      { id:212, unit:5, type:"mc", q:"¿Qué es la esteganografía en el contexto forense?", opts:["Cifrado de evidencias forenses","Técnica para ocultar información dentro de ficheros aparentemente inocuos (imágenes, audio)","Método de compresión de evidencias","Sistema de firma digital de evidencias"], a:1, exp:"La esteganografía oculta datos dentro de otros ficheros (JPG, MP3…). En forense se analiza si los ficheros contienen datos ocultos." },
      { id:213, unit:5, type:"mc", q:"¿Qué es la 'cadena de custodia' en análisis forense digital?", opts:["Secuencia de herramientas usadas","Registro documentado de quién manejó las evidencias desde su recogida hasta el juicio","Orden de recogida de evidencias","Log de acciones del investigador"], a:1, exp:"La cadena de custodia documenta quién, cuándo y cómo manejó las evidencias, garantizando que no han sido alteradas y tienen validez legal." },
      { id:214, unit:5, type:"mc", q:"¿Qué información contiene /var/log/secure relevante para el análisis forense?", opts:["Errores del kernel","Conexiones SSH y intentos de autenticación","Tráfico de red","Cambios en el sistema de ficheros"], a:1, exp:"/var/log/secure registra: conexiones SSH (con IP origen), intentos de login sudo/su, y autenticaciones PAM. Clave para rastrear accesos no autorizados." },
      { id:215, unit:5, type:"mc", q:"¿Qué hace Autopsy al analizar 'Unallocated fragments'?", opts:["Analiza el espacio de swap","Muestra bloques de disco con ficheros borrados recuperables","Lista procesos activos","Analiza los logs del sistema"], a:1, exp:"Unallocated fragments son bloques no asignados a ficheros activos: contienen ficheros borrados que aún pueden recuperarse si no han sido sobreescritos." },
      { id:216, unit:5, type:"mc", q:"¿Cuándo finaliza oficialmente un análisis forense?", opts:["Al recuperar todos los ficheros borrados","Al generar los dos informes (técnico y ejecutivo) y documentar la cadena de custodia","Al reinstalar el sistema comprometido","Al identificar la IP del atacante"], a:1, exp:"El análisis forense concluye con los dos informes (técnico detallado + ejecutivo sin tecnicismos) y la cadena de custodia para uso legal." },
      { id:217, unit:5, type:"tf", q:"En el caso forense práctico, el atacante instaló un rootkit que creó la cuenta del usuario 'ssh'.", a:true, exp:"El caso práctico muestra que el rootkit (/var/ftp/nerod.tar.gz) creó la cuenta 'ssh' con uid=0 para mantener acceso root persistente." },
      { id:218, unit:5, type:"mc", q:"¿Cuál de estas categorías de Sleuthkit trabaja con los i-nodos?", opts:["Data unit","Metadata","File name","File system"], a:1, exp:"La categoría Metadata de Sleuthkit accede a los i-nodos: fechas (acceso/modificación/creación), permisos, propietarios y punteros a bloques." },
      { id:219, unit:5, type:"mc", q:"¿Qué herramienta permite crear un timeline cronológico de actividad del sistema de ficheros?", opts:["md5sum","Autopsy/Sleuthkit","Snort","Fail2ban"], a:1, exp:"Autopsy/Sleuthkit crea un timeline con todos los eventos del FS (accesos, modificaciones, creaciones) ordenados cronológicamente para reconstruir el ataque." },
      { id:220, unit:5, type:"mc", q:"¿Qué información útil para el análisis forense está en /etc/redhat-release?", opts:["Paquetes instalados recientemente","Versión del sistema operativo","Usuarios del sistema","Servicios en ejecución"], a:1, exp:"/etc/redhat-release contiene la versión del SO: 'Red Hat Linux release 7.1 (seawolf)'. Útil para identificar vulnerabilidades conocidas de esa versión." },
    ];

    const UNIT_NAMES = {
      1: "Unidad 1 – Introducción y Ataques",
      2: "Unidad 2 – Prevención",
      3: "Unidad 3 – Detección (IDS)",
      4: "Unidad 4 – Copias de Seguridad",
      5: "Unidad 5 – Análisis Forense",
    };

    const UNIT_COLORS = {
      1: "#D85A30",
      2: "#0F6E56",
      3: "#185FA5",
      4: "#BA7517",
      5: "#993556",
    };

    // Examen oficial Junio 2025 - Universidad de Almería (18/06/2025)
    const EXAM_JUNE_2025 = [
      { id:"e1",  unit:1, type:"mc", q:"¿Qué tipo de ataque consiste en saturar un servidor con múltiples solicitudes para que deje de funcionar?", opts:["Phishing","DDoS","Ransomware","Spoofing"], a:1, exp:"DDoS (Distributed Denial of Service) busca colapsar un servidor enviando tráfico masivo desde múltiples orígenes." },
      { id:"e2",  unit:1, type:"tf", q:"Una consulta de DNS inversa permite obtener una dirección IP a partir de un nombre de dominio.", a:false, exp:"Al revés: la DNS inversa obtiene el NOMBRE DE DOMINIO a partir de la IP, no la IP a partir del nombre." },
      { id:"e3",  unit:1, type:"mc", q:"¿Cuál de estos ataques se aprovecha de errores en una base de datos?", opts:["Keylogging","Cross-site scripting","SQL Injection","Backdoor"], a:2, exp:"SQL Injection inyecta código SQL malicioso para manipular o extraer información de la base de datos." },
      { id:"e4",  unit:1, type:"tf", q:"En un ataque 'activo' por 'denegación de servicio', un intruso altera una parte de la información para su beneficio.", a:false, exp:"El DoS busca interrumpir el servicio, no alterar datos. Alterar datos es un ataque de modificación, no DoS." },
      { id:"e5",  unit:1, type:"tf", q:"Una forma de identificar el sistema operativo de un equipo es mediante el rastreo de pilas IP.", a:true, exp:"El rastreo de pilas (stack fingerprinting) analiza diferencias en la implementación TCP/IP de cada SO para identificarlo." },
      { id:"e6",  unit:1, type:"tf", q:"¿La ejecución de un exploit del kernel permite siempre una escalada de privilegios?", a:false, exp:"No siempre: depende del exploit concreto y del sistema. No todos los exploits de kernel garantizan acceso root." },
